<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <?!= include('styles'); ?>
  <title>Voting Komite SMPN 2 Kawali</title>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="https://drive.google.com/uc?export=view&id=1nlVZtT1OQJKcX61ylMOkufbIE9x2MK6k" alt="Logo Sekolah" class="logo">
      <h1>PEMILIHAN KOMITE</h1>
      <h2>SMP NEGERI 2 KAWALI</h2>
      <p>Tahun 2026</p>
    </div>

    <div id="loginForm" class="card">
      <h3>🔐 LOGIN PEMILIH</h3>
      <input type="text" id="nama" placeholder="Nama Lengkap" required>
      <input type="text" id="alamat" placeholder="Alamat" required>
      <input type="password" id="password" placeholder="Password">
      <button onclick="doLogin()" class="btn-primary">MASUK</button>
      <div id="loginMessage" class="message"></div>
    </div>

    <div id="votingPanel" style="display:none;">
      <div class="welcome-banner">
        <h3>Selamat Datang, <span id="userName"></span>!</h3>
      </div>
      <div class="candidates-grid" id="candidatesGrid"></div>
    </div>

    <div id="adminPanel" style="display:none;">
      <div class="admin-header">
        <h3>📊 Panel Admin</h3>
        <button onclick="logout()" class="btn-logout">Keluar</button>
      </div>
      
      <div class="voting-control">
        <button id="toggleVotingBtn" class="btn-control" onclick="toggleVoting()">Loading...</button>
        <button onclick="resetVoting()" class="btn-danger">Reset Voting</button>
      </div>

      <div id="diagramContainer" class="chart-container">
        <canvas id="hasilChart"></canvas>
      </div>

      <div class="rekap-suara" id="rekapSuara"></div>
    </div>

    <div id="adminLoginForm" class="card" style="display:none;">
      <h3>👑 LOGIN ADMIN</h3>
      <input type="text" id="adminUser" placeholder="Username">
      <input type="password" id="adminPass" placeholder="Password">
      <button onclick="doAdminLogin()" class="btn-primary">MASUK SEBAGAI ADMIN</button>
      <div id="adminMessage" class="message"></div>
      <button onclick="showPemilihLogin()" class="btn-secondary">← Kembali ke Login Pemilih</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    let currentUser = null;
    let calonData = [];
    let hasilChart = null;

    // ==================== LOGIN PEMILIH ====================
    async function doLogin() {
      const nama = document.getElementById('nama').value.trim();
      const alamat = document.getElementById('alamat').value.trim();
      const password = document.getElementById('password').value;

      if (!nama || !alamat) {
        showMessage('loginMessage', 'Lengkapi nama dan alamat!', 'error');
        return;
      }

      const result = await google.script.run.withSuccessHandler((res) => {
        if (res.success) {
          currentUser = { id: res.pemilihId, nama: res.nama, alamat: res.alamat };
          showVotingPanel();
        } else {
          showMessage('loginMessage', res.message, 'error');
        }
      }).loginPemilih(nama, alamat, password);
    }

    async function showVotingPanel() {
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('adminLoginForm').style.display = 'none';
      document.getElementById('votingPanel').style.display = 'block';
      document.getElementById('userName').innerText = currentUser.nama;

      const status = await google.script.run.withSuccessHandler((isOpen) => {
        if (!isOpen) {
          showMessage('loginMessage', 'Voting sedang ditutup!', 'error');
          setTimeout(() => logout(), 2000);
        }
      }).getVotingStatus();

      loadCandidates();
    }

    async function loadCandidates() {
      calonData = await google.script.run.withSuccessHandler((data) => {
        const grid = document.getElementById('candidatesGrid');
        grid.innerHTML = '';
        
        data.forEach(calon => {
          const card = document.createElement('div');
          card.className = 'candidate-card';
          card.innerHTML = `
            <img src="${calon.foto.replace('thumbnail?id=', 'uc?export=view&id=').replace('&sz=w1000', '')}" alt="${calon.nama}">
            <h4>${calon.nama}</h4>
            <div class="visi-misi">
              <strong>Visi:</strong>
              <p>${calon.visi}</p>
              <strong>Misi:</strong>
              <p>${calon.misi}</p>
            </div>
            <button onclick="vote(${calon.id})" class="btn-vote">🗳️ PILIH</button>
          `;
          grid.appendChild(card);
        });
      }).getCalon();
    }

    async function vote(calonId) {
      const result = await google.script.run.withSuccessHandler((res) => {
        if (res.success) {
          alert(res.message);
          logout();
        } else {
          alert(res.message);
        }
      }).vote(currentUser.id, calonId, currentUser.nama, currentUser.alamat);
    }

    // ==================== LOGIN ADMIN ====================
    function showAdminLogin() {
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('adminLoginForm').style.display = 'block';
    }

    function showPemilihLogin() {
      document.getElementById('loginForm').style.display = 'block';
      document.getElementById('adminLoginForm').style.display = 'none';
      document.getElementById('adminPanel').style.display = 'none';
    }

    async function doAdminLogin() {
      const username = document.getElementById('adminUser').value;
      const password = document.getElementById('adminPass').value;

      const result = await google.script.run.loginAdmin(username, password);
      if (result.success) {
        document.getElementById('adminLoginForm').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        loadAdminData();
      } else {
        showMessage('adminMessage', 'Username atau password salah!', 'error');
      }
    }

    async function loadAdminData() {
      // Load status voting
      const status = await google.script.run.getVotingStatus();
      const toggleBtn = document.getElementById('toggleVotingBtn');
      toggleBtn.innerText = status ? 'Tutup Voting' : 'Buka Voting';
      toggleBtn.className = status ? 'btn-danger' : 'btn-success';
      
      // Load hasil
      const hasil = await google.script.run.getHasilVoting();
      updateRekap(hasil);
      updateChart(hasil);
    }

    function updateRekap(hasil) {
      const container = document.getElementById('rekapSuara');
      let html = '<table class="rekap-table"><tr><th>Posisi</th><th>Nama Calon</th><th>Jumlah Suara</th></tr>';
      
      hasil.forEach(calon => {
        html += `<tr>
          <td><strong>${calon.posisi || '-'}</strong></td>
          <td>${calon.nama}</td>
          <td>${calon.suara} suara</td>
        </tr>`;
      });
      
      // Tambahkan total suara
      const total = hasil.reduce((sum, c) => sum + c.suara, 0);
      html += `<tr class="total-row"><td colspan="2"><strong>Total Suara</strong></td><td><strong>${total}</strong></td></tr>`;
      html += '</table>';
      
      container.innerHTML = html;
    }

    function updateChart(hasil) {
      const ctx = document.getElementById('hasilChart').getContext('2d');
      if (hasilChart) hasilChart.destroy();
      
      hasilChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: hasil.map(c => c.nama.split(' ')[0]),
          datasets: [{
            label: 'Jumlah Suara',
            data: hasil.map(c => c.suara),
            backgroundColor: 'rgba(54, 162, 235, 0.7)',
            borderRadius: 8
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { position: 'top' },
            title: { display: true, text: 'Grafik Hasil Voting' }
          }
        }
      });
    }

    async function toggleVoting() {
      const status = await google.script.run.getVotingStatus();
      const newStatus = await google.script.run.setVotingStatus(!status);
      loadAdminData();
    }

    async function resetVoting() {
      if (confirm('Yakin ingin mereset semua data voting? Tindakan ini tidak dapat dibatalkan!')) {
        await google.script.run.resetVoting();
        loadAdminData();
        alert('Voting berhasil direset!');
      }
    }

    function logout() {
      currentUser = null;
      document.getElementById('votingPanel').style.display = 'none';
      document.getElementById('adminPanel').style.display = 'none';
      document.getElementById('loginForm').style.display = 'block';
      document.getElementById('nama').value = '';
      document.getElementById('alamat').value = '';
      document.getElementById('password').value = '';
    }

    function showMessage(elementId, message, type) {
      const el = document.getElementById(elementId);
      el.innerText = message;
      el.className = `message ${type}`;
      setTimeout(() => {
        el.innerText = '';
        el.className = 'message';
      }, 3000);
    }

    // Tambahkan tombol admin di halaman login
    document.addEventListener('DOMContentLoaded', () => {
      const loginDiv = document.getElementById('loginForm');
      const adminBtn = document.createElement('button');
      adminBtn.innerText = 'Login sebagai Admin';
      adminBtn.className = 'btn-secondary';
      adminBtn.onclick = showAdminLogin;
      adminBtn.style.marginTop = '10px';
      loginDiv.appendChild(adminBtn);
    });
  </script>
</body>
</html>
