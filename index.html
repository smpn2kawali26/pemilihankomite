<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pemilihan Komite SMPN 2 Kawali</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#7f0000,#d62828);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
color:white;
}

.container{
width:100%;
max-width:1100px;
}

.card{
background:rgba(255,255,255,0.12);
backdrop-filter:blur(12px);
padding:30px;
border-radius:25px;
box-shadow:0 8px 30px rgba(0,0,0,0.3);
text-align:center;
}

.logo{
width:120px;
height:120px;
border-radius:50%;
background:white;
padding:10px;
margin-bottom:20px;
}

h1{
font-size:34px;
font-weight:700;
margin-bottom:10px;
}

h2{
font-size:20px;
font-weight:400;
margin-bottom:15px;
}

#clock{
font-size:18px;
margin-bottom:25px;
font-weight:600;
}

.input-group{
margin-bottom:20px;
}

input{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-size:16px;
outline:none;
}

.btn{
padding:14px 25px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:16px;
font-weight:600;
margin:10px;
transition:0.3s;
}

.btn-login{
background:#ffd166;
color:#000;
}

.btn-admin{
background:#ffffff;
color:#7f0000;
}

.btn:hover{
transform:scale(1.05);
}

#loading{
display:none;
margin-top:15px;
}

.calon-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:30px;
}

.calon-card{
background:white;
color:#333;
border-radius:20px;
padding:20px;
text-align:left;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

.calon-card img{
width:100%;
height:250px;
object-fit:cover;
border-radius:15px;
margin-bottom:15px;
}

.calon-card h3{
margin-bottom:10px;
color:#7f0000;
}

.vote-btn{
width:100%;
background:#d62828;
color:white;
padding:12px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
margin-top:15px;
}

.hasil{
margin-top:30px;
background:white;
color:#333;
padding:20px;
border-radius:20px;
text-align:left;
}

.rank{
padding:12px;
margin-bottom:10px;
border-radius:10px;
background:#f4f4f4;
font-weight:600;
}

footer{
margin-top:25px;
font-size:14px;
opacity:0.9;
}
</style>
</head>

<body>

<div class="container">

<div class="card" id="loginPage">

<img src="logo.png" class="logo">

<h1>PEMILIHAN KOMITE SEKOLAH</h1>
<h2>SMP NEGERI 2 KAWALI</h2>

<div id="clock"></div>

<div class="input-group">
<input type="text" id="nama" placeholder="Masukkan Nama">
</div>

<div class="input-group">
<input type="text" id="alamat" placeholder="Masukkan Alamat">
</div>

<button class="btn btn-login" onclick="loginPemilih()">
Login Pemilih
</button>

<button class="btn btn-admin" onclick="loginAdmin()">
Login Admin
</button>

<div id="loading">Memproses...</div>

<footer>
© SMP Negeri 2 Kawali 2026
</footer>

</div>

<div id="votingPage" style="display:none;">
<div class="card">

<h1>DAFTAR CALON KOMITE</h1>

<div class="calon-container" id="calonList"></div>

<div id="hasilAdmin" class="hasil" style="display:none;"></div>

</div>
</div>

</div>

<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxf0OKDjaz-WPGqPRxPxlqsi7gcTFOOcqRnTYPQhBLFEZSDu3WqZZLfRnNdJxA_Ee_1/exec";

let currentUser = "";

function updateClock(){
const now = new Date();

document.getElementById("clock").innerHTML =
now.toLocaleDateString('id-ID') + " | " +
now.toLocaleTimeString('id-ID');
}

setInterval(updateClock,1000);
updateClock();

async function loginPemilih(){

const nama = document.getElementById("nama").value;
const alamat = document.getElementById("alamat").value;

if(!nama || !alamat){
alert("Lengkapi data!");
return;
}

currentUser = nama;

document.getElementById("loading").style.display = "block";

const res = await fetch(`${WEB_APP_URL}?action=login&nama=${nama}&alamat=${alamat}`);
const data = await res.json();

document.getElementById("loading").style.display = "none";

if(data.status == "success"){

document.getElementById("loginPage").style.display = "none";
document.getElementById("votingPage").style.display = "block";

loadCalon();

}else{
alert(data.message);
}

}

async function loginAdmin(){

const pass = prompt("Masukkan Password Admin");

if(pass != "admin123"){
alert("Password salah!");
return;
}

document.getElementById("loginPage").style.display = "none";
document.getElementById("votingPage").style.display = "block";

loadHasil();

}

async function loadCalon(){

const res = await fetch(`${WEB_APP_URL}?action=getCalon`);
const data = await res.json();

let html = "";

data.forEach(c => {

html += `
<div class="calon-card">

<img src="${convertDrive(c.foto)}">

<h3>${c.nama}</h3>

<p><b>Visi:</b><br>${c.visi}</p>

<p style="margin-top:10px;">
<b>Misi:</b><br>${c.misi}
</p>

<button class="vote-btn"
onclick="vote('${c.id}')">
PILIH
</button>

</div>
`;

});

document.getElementById("calonList").innerHTML = html;

}

async function vote(id){

if(!confirm("Yakin memilih calon ini?")){
return;
}

const alamat = document.getElementById("alamat").value;

const res = await fetch(
`${WEB_APP_URL}?action=vote&nama=${currentUser}&alamat=${alamat}&id=${id}`
);

const data = await res.json();

alert(data.message);

if(data.status == "success"){
location.reload();
}

}

async function loadHasil(){

document.getElementById("hasilAdmin").style.display = "block";

const res = await fetch(`${WEB_APP_URL}?action=hasil`);
const data = await res.json();

let html = `
<h2>HASIL PEMILIHAN</h2>
`;

data.forEach((d,i)=>{

let jabatan = "";

if(i==0) jabatan="Ketua";
if(i==1) jabatan="Sekretaris";
if(i==2) jabatan="Bendahara";
if(i>=3) jabatan="Anggota";

html += `
<div class="rank">
${jabatan} :
${d.nama}
(${d.suara} suara)
</div>
`;

});

document.getElementById("hasilAdmin").innerHTML = html;

}

function convertDrive(url){

const id = url.match(/[-\w]{25,}/);

return `https://drive.google.com/thumbnail?id=${id}`;
}

</script>

</body>
</html>
