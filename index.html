<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pemilihan Komite SMPN 2 Kawali</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#003566,#0077b6);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow-x:hidden;
position:relative;
}

body::before{
content:"🗳️";
position:fixed;
font-size:300px;
opacity:0.05;
top:50%;
left:50%;
transform:translate(-50%,-50%);
pointer-events:none;
}

.container{
width:100%;
max-width:1300px;
}

.card{
background:rgba(255,255,255,0.12);
backdrop-filter:blur(12px);
padding:30px;
border-radius:25px;
box-shadow:0 8px 30px rgba(0,0,0,0.3);
text-align:center;
color:white;
animation:fadeIn 0.8s ease;
}

.logo{
width:130px;
height:130px;
object-fit:contain;
border-radius:50%;
background:white;
padding:10px;
margin-bottom:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

h1{
font-size:34px;
font-weight:700;
margin-bottom:10px;
}

h2{
font-size:20px;
font-weight:400;
margin-bottom:20px;
}

#clock{
margin-bottom:25px;
}

.input-group{
margin-bottom:20px;
}

input{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-size:16px;
outline:none;
}

.btn{
padding:14px 25px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:16px;
font-weight:600;
margin:10px;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
}

.btn-login{
background:#90e0ef;
color:#000;
}

.btn-admin{
background:white;
color:#003566;
}

.btn-control{
background:#00b4d8;
color:white;
}

.btn-danger{
background:#d62828;
color:white;
}

.summary{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-top:20px;
}

.summary-card{
background:white;
padding:20px;
border-radius:15px;
color:#333;
font-weight:600;
}

.hasil-box{
background:white;
color:#333;
padding:20px;
border-radius:20px;
margin-top:25px;
text-align:left;
}

.rank{
background:#f5f5f5;
padding:15px;
border-radius:12px;
margin-bottom:10px;
font-weight:600;
}

.chart-box{
background:white;
padding:20px;
border-radius:20px;
margin-top:25px;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.popup{
background:white;
padding:30px;
border-radius:20px;
text-align:center;
min-width:300px;
max-width:90%;
animation:fadeIn 0.3s ease;
color:#333;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.spinner{
width:50px;
height:50px;
border:5px solid #eee;
border-top:5px solid #0077b6;
border-radius:50%;
animation:spin 1s linear infinite;
margin:0 auto 20px;
}

footer{
margin-top:20px;
font-size:14px;
opacity:0.9;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div class="container">

<div class="card" id="loginPage">

<img src="logo.png" class="logo">

<h1>PEMILIHAN KOMITE SEKOLAH</h1>

<h2>SMP NEGERI 2 KAWALI</h2>

<div id="clock"></div>

<div class="input-group">
<input type="text" id="nama" placeholder="Masukkan Nama">
</div>

<div class="input-group">
<input type="text" id="alamat" placeholder="Masukkan Alamat">
</div>

<button class="btn btn-login" onclick="loginPemilih()">
LOGIN PEMILIH
</button>

<button class="btn btn-admin" onclick="loginAdmin()">
LOGIN ADMIN
</button>

<footer>
© SMP Negeri 2 Kawali 2026
</footer>

</div>

<div id="adminPage" style="display:none;">

<div class="card">

<h1>DASHBOARD ADMIN</h1>

<div class="summary" id="summaryBox"></div>

<div style="margin-top:20px;">

<button class="btn btn-control" onclick="toggleVoting('buka')">
BUKA VOTING
</button>

<button class="btn btn-danger" onclick="toggleVoting('tutup')">
TUTUP VOTING
</button>

<button class="btn btn-control" onclick="resetVoting()">
RESET VOTING
</button>

<button class="btn btn-control" onclick="downloadExcel()">
EXPORT EXCEL
</button>

<button class="btn btn-control" onclick="window.print()">
EXPORT PDF
</button>

</div>

<div class="chart-box">
<canvas id="voteChart"></canvas>
</div>

<div class="hasil-box" id="hasilBox"></div>

</div>

</div>

</div>

<div class="overlay" id="overlay">

<div class="popup">

<div class="spinner"></div>

<div id="popupText">
Sedang memproses...
</div>

</div>

</div>

<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxf0OKDjaz-WPGqPRxPxlqsi7gcTFOOcqRnTYPQhBLFEZSDu3WqZZLfRnNdJxA_Ee_1/exec";

let chart;

function realtimeClock(){

const now = new Date();

const hari = [
"Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"
];

const bulan = [
"Januari","Februari","Maret","April","Mei","Juni",
"Juli","Agustus","September","Oktober","November","Desember"
];

const tanggal =
hari[now.getDay()] + ", " +
now.getDate() + " " +
bulan[now.getMonth()] + " " +
now.getFullYear();

const jam = now.toLocaleTimeString('id-ID');

document.getElementById("clock").innerHTML = `
<div style="font-size:22px;font-weight:700;">
${tanggal}
</div>

<div style="margin-top:8px;font-size:18px;">
${jam}
</div>
`;

}

setInterval(realtimeClock,1000);
realtimeClock();

function showLoading(text="Sedang memproses..."){

document.getElementById("overlay").style.display="flex";
document.getElementById("popupText").innerHTML=text;

}

function hideLoading(){

document.getElementById("overlay").style.display="none";

}

function showNotif(text){

document.getElementById("overlay").style.display="flex";

document.getElementById("popupText").innerHTML=`
<div style="font-size:18px;font-weight:600;">
${text}
</div>
`;

setTimeout(()=>{
hideLoading();
},2000);

}

async function loginPemilih(){

const nama=document.getElementById("nama").value.trim();
const alamat=document.getElementById("alamat").value.trim();

if(!nama || !alamat){

showNotif("Lengkapi data terlebih dahulu");
return;

}

showLoading("Sedang login...");

const res = await fetch(
`${WEB_APP_URL}?action=login&nama=${encodeURIComponent(nama)}&alamat=${encodeURIComponent(alamat)}`
);

const data = await res.json();

hideLoading();

if(data.status=="success"){

showNotif("Silakan memilih");

setTimeout(()=>{
location.href="#";
location.reload();
},1500);

}else{

showNotif(data.message);

}

}

async function loginAdmin(){

const username = prompt("Masukkan Username Admin");
const password = prompt("Masukkan Password Admin");

if(!username || !password) return;

showLoading("Login admin...");

const res = await fetch(
`${WEB_APP_URL}?action=adminLogin&username=${username}&password=${password}`
);

const data = await res.json();

hideLoading();

if(data.status=="success"){

document.getElementById("loginPage").style.display="none";
document.getElementById("adminPage").style.display="block";

loadSummary();
loadHasil();

setInterval(loadSummary,3000);
setInterval(loadHasil,3000);

}else{

showNotif(data.message);

}

}

async function loadSummary(){

const res = await fetch(
`${WEB_APP_URL}?action=summary`
);

const data = await res.json();

document.getElementById("summaryBox").innerHTML=`

<div class="summary-card">
Total Pemilih
<br><br>
${data.totalPemilih}
</div>

<div class="summary-card">
Sudah Voting
<br><br>
${data.sudahVoting}
</div>

<div class="summary-card">
Belum Voting
<br><br>
${data.belumVoting}
</div>

<div class="summary-card">
Status Voting
<br><br>
${data.statusVoting}
</div>

`;

}

async function loadHasil(){

const res = await fetch(
`${WEB_APP_URL}?action=hasil`
);

const data = await res.json();

let html=`<h2>HASIL PEMILIHAN</h2>`;

let labels=[];
let votes=[];

data.forEach(d=>{

labels.push(d.nama);
votes.push(d.suara);

html+=`
<div class="rank">
${d.jabatan} : ${d.nama}
<br>
Jumlah Suara : ${d.suara}
</div>
`;

});

document.getElementById("hasilBox").innerHTML=html;

renderChart(labels,votes);

}

function renderChart(labels,votes){

const ctx = document.getElementById('voteChart');

if(chart){
chart.destroy();
}

chart = new Chart(ctx,{
type:'bar',
data:{
labels:labels,
datasets:[{
label:'Jumlah Suara',
data:votes
}]
},
options:{
responsive:true
}
});

}

async function toggleVoting(status){

showLoading("Mengubah status voting...");

const res = await fetch(
`${WEB_APP_URL}?action=toggleVoting&status=${status}`
);

const data = await res.json();

hideLoading();

showNotif(data.message);

}

async function resetVoting(){

if(!confirm("Yakin reset semua voting?")){
return;
}

showLoading("Mereset voting...");

const res = await fetch(
`${WEB_APP_URL}?action=resetVoting`
);

const data = await res.json();

hideLoading();

showNotif(data.message);

}

function downloadExcel(){

window.open(WEB_APP_URL + "?action=exportExcel");

}

</script>

</body>
</html>
