<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>E-Voting Komite SMPN 2 Kawali</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            padding: 30px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
        }

        .header p {
            color: #666;
            margin-top: 10px;
        }

        /* Tab Styles */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab {
            padding: 12px 24px;
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            color: #666;
            font-weight: 600;
        }

        .tab.active {
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
            font-weight: 600;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Candidate Cards */
        .candidates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .candidate-card {
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
        }

        .candidate-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .candidate-card.selected {
            border-color: #667eea;
            background: #f0f0ff;
        }

        .candidate-number {
            background: #667eea;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .candidate-name {
            font-size: 18px;
            font-weight: bold;
            margin: 10px 0;
        }

        .candidate-vision {
            color: #666;
            font-size: 14px;
            margin-top: 10px;
        }

        /* Alert Styles */
        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        /* Result Table */
        .result-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .result-table th, .result-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .result-table th {
            background: #f5f5f5;
            font-weight: 600;
        }

        .progress-bar {
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            height: 30px;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea, #764ba2);
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            transition: width 0.5s;
        }

        .hidden {
            display: none;
        }

        .admin-panel {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #e0e0e0;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-open {
            background: #d4edda;
            color: #155724;
        }

        .status-closed {
            background: #f8d7da;
            color: #721c24;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            .tabs {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🗳️ E-Voting Komite SMPN 2 Kawali</h1>
            <p>Pemilihan Ketua Komite Sekolah Periode 2024-2026</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="showTab('voter')">👤 Pemilih</button>
            <button class="tab" onclick="showTab('admin')">🔐 Admin</button>
        </div>

        <!-- Alert Container -->
        <div id="alert" class="alert"></div>

        <!-- Voter Panel -->
        <div id="voterPanel">
            <div id="loginForm">
                <h3>Login Pemilih</h3>
                <div class="form-group">
                    <label>Nomor Induk Pemilih (NIS/NIP)</label>
                    <input type="text" id="voterId" placeholder="Masukkan NIS/NIP Anda">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="voterPassword" placeholder="Masukkan password">
                </div>
                <button onclick="loginVoter()">Login & Voting</button>
            </div>

            <div id="votingForm" class="hidden">
                <h3>Pilih Calon Ketua Komite</h3>
                <div id="candidatesList" class="candidates-grid"></div>
                <div class="form-group" style="margin-top: 20px;">
                    <button id="submitVoteBtn" onclick="submitVote()" disabled>Konfirmasi Pilihan</button>
                </div>
                <button onclick="logoutVoter()" style="background: #6c757d; margin-top: 10px;">Logout</button>
            </div>

            <div id="voterResultInfo" class="hidden">
                <div class="alert success" style="display: block;">
                    ✅ Terima kasih! Anda sudah memberikan suara.
                </div>
                <button onclick="logoutVoter()" style="background: #6c757d;">Logout</button>
            </div>
        </div>

        <!-- Admin Panel -->
        <div id="adminPanel" class="hidden">
            <div id="adminLoginForm">
                <h3>Login Admin</h3>
                <div class="form-group">
                    <label>Username Admin</label>
                    <input type="text" id="adminUser" placeholder="Username">
                </div>
                <div class="form-group">
                    <label>Password Admin</label>
                    <input type="password" id="adminPass" placeholder="Password">
                </div>
                <button onclick="loginAdmin()">Login Admin</button>
            </div>

            <div id="adminDashboard" class="hidden">
                <div id="votingStatusPanel" style="margin-bottom: 20px;">
                    <h4>Status Voting: <span id="votingStatusLabel">-</span></h4>
                    <button id="toggleVotingBtn" onclick="toggleVotingStatus()" class="button"></button>
                </div>

                <h3>Hasil Voting Sementara</h3>
                <div id="resultsContainer"></div>

                <div class="admin-panel">
                    <h3>Manajemen Data</h3>
                    <button onclick="resetVoting()" style="background: #dc3545; margin-top: 10px;">Reset Semua Data Voting</button>
                    <button onclick="exportResults()" style="background: #28a745; margin-top: 10px;">Export Hasil ke CSV</button>
                </div>

                <button onclick="logoutAdmin()" style="background: #6c757d; margin-top: 20px;">Logout Admin</button>
            </div>
        </div>
    </div>

    <script>
        let currentVoter = null;
        let currentAdmin = false;
        let selectedCandidate = null;
        let votingStatus = false;

        // Show tab
        window.showTab = function(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            if(tab === 'voter') {
                document.getElementById('voterPanel').style.display = 'block';
                document.getElementById('adminPanel').classList.add('hidden');
                document.getElementById('adminPanel').style.display = 'none';
            } else {
                document.getElementById('voterPanel').style.display = 'none';
                document.getElementById('adminPanel').classList.remove('hidden');
                document.getElementById('adminPanel').style.display = 'block';
            }
        };

        // Show alert
        function showAlert(message, type) {
            const alertDiv = document.getElementById('alert');
            alertDiv.className = `alert ${type}`;
            alertDiv.innerHTML = message;
            alertDiv.style.display = 'block';
            setTimeout(() => {
                alertDiv.style.display = 'none';
            }, 3000);
        }

        // Login Voter
        window.loginVoter = function() {
            const voterId = document.getElementById('voterId').value;
            const password = document.getElementById('voterPassword').value;
            
            if(!voterId || !password) {
                showAlert('Harap isi NIS/NIP dan password!', 'error');
                return;
            }

            google.script.run.withSuccessHandler(function(result) {
                if(result.success) {
                    currentVoter = result.data;
                    checkVoterStatus();
                } else {
                    showAlert(result.message, 'error');
                }
            }).loginVoter(voterId, password);
        };

        function checkVoterStatus() {
            google.script.run.withSuccessHandler(function(hasVoted) {
                if(hasVoted) {
                    document.getElementById('loginForm').classList.add('hidden');
                    document.getElementById('votingForm').classList.add('hidden');
                    document.getElementById('voterResultInfo').classList.remove('hidden');
                } else {
                    loadCandidates();
                    document.getElementById('loginForm').classList.add('hidden');
                    document.getElementById('votingForm').classList.remove('hidden');
                    document.getElementById('voterResultInfo').classList.add('hidden');
                }
            }).checkVoterStatus(currentVoter.id);
        }

        function loadCandidates() {
            google.script.run.withSuccessHandler(function(candidates) {
                const container = document.getElementById('candidatesList');
                container.innerHTML = '';
                candidates.forEach(candidate => {
                    const card = document.createElement('div');
                    card.className = 'candidate-card';
                    card.onclick = () => selectCandidate(candidate.id);
                    card.innerHTML = `
                        <div class="candidate-number">${candidate.nomor_urut}</div>
                        <div class="candidate-name">${candidate.nama}</div>
                        <div class="candidate-vision">${candidate.visi_misi.substring(0, 100)}...</div>
                    `;
                    container.appendChild(card);
                });
            }).getCandidates();
        }

        window.selectCandidate = function(candidateId) {
            selectedCandidate = candidateId;
            document.querySelectorAll('.candidate-card').forEach(card => {
                card.classList.remove('selected');
            });
            event.target.closest('.candidate-card').classList.add('selected');
            document.getElementById('submitVoteBtn').disabled = false;
        };

        window.submitVote = function() {
            if(!selectedCandidate) {
                showAlert('Pilih calon terlebih dahulu!', 'error');
                return;
            }
            
            if(confirm('Apakah Anda yakin dengan pilihan Anda? Suara tidak dapat diubah!')) {
                google.script.run.withSuccessHandler(function(result) {
                    if(result.success) {
                        showAlert('Terima kasih! Suara Anda telah tersimpan.', 'success');
                        document.getElementById('votingForm').classList.add('hidden');
                        document.getElementById('voterResultInfo').classList.remove('hidden');
                    } else {
                        showAlert(result.message, 'error');
                    }
                }).submitVote(currentVoter.id, selectedCandidate);
            }
        };

        window.logoutVoter = function() {
            currentVoter = null;
            selectedCandidate = null;
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('votingForm').classList.add('hidden');
            document.getElementById('voterResultInfo').classList.add('hidden');
            document.getElementById('voterId').value = '';
            document.getElementById('voterPassword').value = '';
        };

        // Admin functions
        window.loginAdmin = function() {
            const username = document.getElementById('adminUser').value;
            const password = document.getElementById('adminPass').value;
            
            google.script.run.withSuccessHandler(function(result) {
                if(result.success) {
                    currentAdmin = true;
                    document.getElementById('adminLoginForm').classList.add('hidden');
                    document.getElementById('adminDashboard').classList.remove('hidden');
                    loadAdminData();
                } else {
                    showAlert('Username atau password admin salah!', 'error');
                }
            }).loginAdmin(username, password);
        };

        function loadAdminData() {
            loadVotingResults();
            loadVotingStatus();
        }

        function loadVotingResults() {
            google.script.run.withSuccessHandler(function(results) {
                const container = document.getElementById('resultsContainer');
                if(results.length === 0) {
                    container.innerHTML = '<p>Belum ada data voting.</p>';
                    return;
                }
                
                let totalVotes = results.reduce((sum, r) => sum + r.jumlah_suara, 0);
                let html = '<table class="result-table"><thead><tr><th>No Urut</th><th>Nama Calon</th><th>Suara</th><th>Persentase</th></tr></thead><tbody>';
                
                results.forEach(result => {
                    let percentage = totalVotes > 0 ? (result.jumlah_suara / totalVotes * 100).toFixed(1) : 0;
                    html += `
                        <tr>
                            <td>${result.nomor_urut}</td>
                            <td>${result.nama}</td>
                            <td>${result.jumlah_suara}</td>
                            <td>
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: ${percentage}%">${percentage}%</div>
                                </div>
                            </td>
                        </tr>
                    `;
                });
                html += '</tbody></table>';
                container.innerHTML = html;
            }).getVotingResults();
        }

        function loadVotingStatus() {
            google.script.run.withSuccessHandler(function(status) {
                votingStatus = status;
                const statusSpan = document.getElementById('votingStatusLabel');
                const toggleBtn = document.getElementById('toggleVotingBtn');
                
                if(status) {
                    statusSpan.innerHTML = '<span class="status-badge status-open">🔓 Terbuka</span>';
                    toggleBtn.innerHTML = '🔒 Tutup Voting';
                    toggleBtn.style.background = '#dc3545';
                } else {
                    statusSpan.innerHTML = '<span class="status-badge status-closed">🔒 Tertutup</span>';
                    toggleBtn.innerHTML = '🔓 Buka Voting';
                    toggleBtn.style.background = '#28a745';
                }
            }).getVotingStatus();
        }

        window.toggleVotingStatus = function() {
            google.script.run.withSuccessHandler(function(result) {
                if(result.success) {
                    showAlert(`Voting ${result.status ? 'dibuka' : 'ditutup'}!`, 'success');
                    loadVotingStatus();
                }
            }).toggleVotingStatus();
        };

        window.resetVoting = function() {
            if(confirm('PERINGATAN! Tindakan ini akan menghapus SEMUA data voting. Lanjutkan?')) {
                google.script.run.withSuccessHandler(function(result) {
                    if(result.success) {
                        showAlert('Semua data voting telah direset!', 'success');
                        loadAdminData();
                    }
                }).resetAllVotingData();
            }
        };

        window.exportResults = function() {
            google.script.run.withSuccessHandler(function(csvContent) {
                const blob = new Blob([csvContent], {type: 'text/csv'});
                const link = document.createElement('a');
                const url = URL.createObjectURL(blob);
                link.href = url;
                link.download = `hasil_voting_${new Date().toISOString().slice(0,19)}.csv`;
                link.click();
                URL.revokeObjectURL(url);
            }).exportResultsToCSV();
        };

        window.logoutAdmin = function() {
            currentAdmin = false;
            document.getElementById('adminLoginForm').classList.remove('hidden');
            document.getElementById('adminDashboard').classList.add('hidden');
            document.getElementById('adminUser').value = '';
            document.getElementById('adminPass').value = '';
        };
    </script>
</body>
</html>
