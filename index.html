<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pemilihan Komite SMPN 2 Kawali</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:
linear-gradient(
135deg,
#001233,
#001845,
#002855,
#023e7d
);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow-x:hidden;
position:relative;
}

body::before{
content:"🗳️";
position:fixed;
font-size:320px;
opacity:0.04;
top:50%;
left:50%;
transform:translate(-50%,-50%);
pointer-events:none;
filter:blur(2px);
}

.container{
width:100%;
max-width:1300px;
}

.card{
background:rgba(255,255,255,0.10);
backdrop-filter:blur(14px);
padding:30px;
border-radius:25px;
box-shadow:0 10px 35px rgba(0,0,0,0.35);
text-align:center;
color:white;
animation:fadeIn 0.8s ease;
border:1px solid rgba(255,255,255,0.15);
}

.logo{
width:130px;
height:130px;
object-fit:contain;
border-radius:50%;
background:white;
padding:10px;
margin-bottom:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.35);
}

h1{
font-size:34px;
font-weight:700;
margin-bottom:10px;
letter-spacing:1px;
}

h2{
font-size:20px;
font-weight:400;
margin-bottom:20px;
}

#clock{
margin-bottom:25px;
}

.input-group{
margin-bottom:20px;
}

input{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-size:16px;
outline:none;
background:rgba(255,255,255,0.95);
}

.btn{
padding:14px 25px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:16px;
font-weight:600;
margin:10px;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
}

.btn-login{
background:#89c2ff;
color:#001233;
}

.btn-admin{
background:white;
color:#001233;
}

.btn-control{
background:#0353a4;
color:white;
}

.btn-danger{
background:#9d0208;
color:white;
}

.calon-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
margin-top:30px;
}

.calon-card{
background:white;
border-radius:20px;
padding:20px;
color:#333;
text-align:left;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
transition:0.3s;
}

.calon-card:hover{
transform:translateY(-5px);
}

.calon-card img{
width:100%;
height:320px;
object-fit:contain;
background:#f5f5f5;
border-radius:15px;
margin-bottom:15px;
padding:5px;
}

.calon-card h3{
color:#001845;
margin-bottom:10px;
}

.vote-btn{
width:100%;
padding:12px;
background:#023e7d;
border:none;
border-radius:10px;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
margin-top:15px;
transition:0.3s;
}

.vote-btn:hover{
background:#001233;
}

.summary{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-top:20px;
}

.summary-card{
background:white;
padding:20px;
border-radius:15px;
color:#333;
font-weight:600;
}

.hasil-box{
background:white;
color:#333;
padding:20px;
border-radius:20px;
margin-top:25px;
text-align:left;
}

.rank{
background:#f5f5f5;
padding:15px;
border-radius:12px;
margin-bottom:10px;
font-weight:600;
}

.chart-box{
background:white;
padding:20px;
border-radius:20px;
margin-top:25px;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.popup{
background:white;
padding:30px;
border-radius:20px;
text-align:center;
min-width:300px;
max-width:90%;
animation:fadeIn 0.3s ease;
color:#333;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.spinner{
width:50px;
height:50px;
border:5px solid #eee;
border-top:5px solid #023e7d;
border-radius:50%;
animation:spin 1s linear infinite;
margin:0 auto 20px;
}

footer{
margin-top:20px;
font-size:14px;
opacity:0.9;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div class="container">

<div class="card" id="loginPage">

<img src="logo.png" class="logo">

<h1>PEMILIHAN KOMITE SEKOLAH</h1>

<h2>SMP NEGERI 2 KAWALI</h2>

<div id="clock"></div>

<div class="input-group">
<input type="text" id="nama" placeholder="Masukkan Nama">
</div>

<div class="input-group">
<input type="text" id="alamat" placeholder="Masukkan Alamat">
</div>

<button class="btn btn-login" onclick="loginPemilih()">
LOGIN PEMILIH
</button>

<button class="btn btn-admin" onclick="loginAdmin()">
LOGIN ADMIN
</button>

<footer>
© SMP Negeri 2 Kawali 2026
</footer>

</div>

<div id="votingPage" style="display:none;">

<div class="card">

<h1>DAFTAR CALON KOMITE</h1>

<div class="calon-container" id="calonList"></div>

</div>

</div>

<div id="adminPage" style="display:none;">

<div class="card">

<h1>DASHBOARD ADMIN</h1>

<div class="summary" id="summaryBox"></div>

<div style="margin-top:20px;">

<button class="btn btn-control" onclick="toggleVoting('buka')">
BUKA VOTING
</button>

<button class="btn btn-danger" onclick="toggleVoting('tutup')">
TUTUP VOTING
</button>

<button class="btn btn-control" onclick="resetVoting()">
RESET SUARA
</button>

<button class="btn btn-control" onclick="downloadExcel()">
EXPORT EXCEL
</button>

<button class="btn btn-control" onclick="window.print()">
EXPORT PDF
</button>

</div>

<div class="chart-box">
<canvas id="voteChart"></canvas>
</div>

<div class="hasil-box" id="hasilBox"></div>

</div>

</div>

</div>

<div class="overlay" id="overlay">

<div class="popup">

<div class="spinner"></div>

<div id="popupText">
Sedang memproses...
</div>

</div>

</div>

<script>

/*
REKOMENDASI:
RESET lebih aman hanya menghapus SUARA,
tetapi TIDAK menghapus daftar pemilih.

Alasannya:
- data pemilih tetap tersimpan
- histori peserta tetap ada
- lebih aman untuk audit sekolah
- menghindari input ulang massal

Jadi sistem sekarang:
✔ reset hasil voting
✔ reset status memilih
✔ daftar pemilih tetap ada
*/

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxf0OKDjaz-WPGqPRxPxlqsi7gcTFOOcqRnTYPQhBLFEZSDu3WqZZLfRnNdJxA_Ee_1/exec";

</script>

</body>
</html>
