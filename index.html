<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pemilihan Komite SMPN 2 Kawali</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f2f5f9;
    font-family:Arial,sans-serif;
    margin:0;
    padding:0;
}

/* =======================
HEADER
======================= */
.header{
    background:linear-gradient(135deg,#b30000,#ff2e2e);
    color:white;
    padding:35px 20px;
    text-align:center;
    border-radius:0 0 25px 25px;
    box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

.logo{
    width:100px;
    height:100px;
    object-fit:contain;
    background:white;
    border-radius:50%;
    padding:10px;
    margin-bottom:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.header h2{
    font-size:38px;
    font-weight:bold;
}

.header h4{
    margin-top:10px;
    font-size:28px;
}

.header p{
    margin-top:10px;
    font-size:18px;
}

/* =======================
LOGIN
======================= */
.login-box{
    max-width:420px;
    margin:35px auto;
    background:white;
    padding:30px;
    border-radius:25px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.login-box h4{
    font-weight:bold;
    color:#b30000;
}

.login-box input{
    border-radius:12px;
    padding:12px;
}

.login-box button{
    border-radius:12px;
    padding:12px;
    font-size:18px;
    font-weight:bold;
}

/* =======================
CALON
======================= */
.calon-container{
    display:none;
    padding:30px 10px;
}

.card-calon{
    border:none;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:0.3s;
    background:white;
    min-height:100%;
}

.card-calon:hover{
    transform:translateY(-5px);
}

.card-calon img{
    width:100%;
    height:350px;
    object-fit:contain;
    background:white;
    padding:10px;
    border-bottom:1px solid #eee;
}

.card-calon .card-body{
    padding:20px;
}

.card-calon h4{
    font-weight:bold;
    text-align:center;
    margin-bottom:20px;
}

.card-calon h6{
    color:#b30000;
    font-weight:bold;
}

.card-calon p{
    text-align:justify;
    line-height:1.7;
}

.btn-pilih{
    background:linear-gradient(135deg,#b30000,#ff3b3b);
    color:white;
    border:none;
    width:100%;
    border-radius:12px;
    padding:12px;
    font-weight:bold;
    margin-top:20px;
    font-size:17px;
    transition:0.3s;
}

.btn-pilih:hover{
    transform:scale(1.02);
}

/* =======================
NOTIFIKASI
======================= */
.notif{
    position:fixed;
    top:20px;
    right:20px;
    background:white;
    padding:15px 20px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    z-index:9999;
    display:none;
    min-width:300px;
    animation:slide 0.4s ease;
}

.notif.success{
    border-left:6px solid #28a745;
}

.notif.error{
    border-left:6px solid #dc3545;
}

@keyframes slide{
    from{
        transform:translateX(100%);
        opacity:0;
    }

    to{
        transform:translateX(0);
        opacity:1;
    }
}

/* =======================
SUKSES
======================= */
.sukses{
    display:none;
    text-align:center;
    padding:80px 20px;
}

.sukses h1{
    font-size:100px;
}

.sukses h2{
    color:#b30000;
    font-size:55px;
    font-weight:bold;
}

.sukses p{
    font-size:24px;
}

.btn-home{
    margin-top:30px;
    padding:14px 25px;
    border:none;
    border-radius:12px;
    background:#b30000;
    color:white;
    font-size:18px;
    font-weight:bold;
    transition:0.3s;
}

.btn-home:hover{
    background:#ff0000;
}

/* =======================
RESPONSIVE
======================= */
@media(max-width:768px){

    .header h2{
        font-size:28px;
    }

    .header h4{
        font-size:22px;
    }

    .card-calon img{
        height:300px;
    }

    .sukses h2{
        font-size:40px;
    }

}

</style>

</head>

<body>

<!-- NOTIF -->
<div id="notif" class="notif"></div>

<!-- HEADER -->
<div class="header">

    <img
    src="https://drive.google.com/thumbnail?id=14MOrGVFoEKwDkd66Mg8rv4f4bCIaMALG&sz=w1000"
    class="logo">

    <h2>PEMILIHAN KOMITE SEKOLAH</h2>

    <h4>SMPN 2 KAWALI</h4>

    <p>Masa Bakti 2026–2031</p>

</div>

<!-- LOGIN -->
<div class="login-box" id="loginBox">

    <h4 class="text-center mb-4">
        LOGIN PESERTA
    </h4>

    <input
    type="text"
    id="nama"
    class="form-control mb-3"
    placeholder="NAMA LENGKAP">

    <input
    type="text"
    id="alamat"
    class="form-control mb-3"
    placeholder="ALAMAT / TEMPAT TINGGAL">

    <input
    type="password"
    id="password"
    class="form-control mb-3"
    placeholder="PASSWORD">

    <button
    class="btn btn-danger w-100"
    onclick="login()">

        LOGIN

    </button>

</div>

<!-- CALON -->
<div class="container calon-container"
id="calonContainer">

    <div class="row"
    id="listCalon"></div>

</div>

<!-- SUKSES -->
<div class="sukses"
id="sukses">

    <h1>✅</h1>

    <h2>TERIMA KASIH</h2>

    <p>
        Suara Anda berhasil disimpan
    </p>

    <button
    class="btn-home"
    onclick="kembaliHome()">

        KEMBALI KE HALAMAN AWAL

    </button>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbz--tv1s4lU-eUMJTlmskNoMtC4u_ndjez--EULA489xYwvKTQqg3QBTEP0OBL-3Cd0/exec";

let currentUser = null;

// =======================
// NOTIFIKASI
// =======================
function showNotif(message,type="success"){

    const notif =
    document.getElementById("notif");

    notif.innerHTML = message;

    notif.className =
    "notif " + type;

    notif.style.display = "block";

    setTimeout(()=>{

        notif.style.display = "none";

    },3000);

}

// =======================
// LOGIN
// =======================
async function login(){

    const nama =
    document.getElementById("nama")
    .value.trim().toUpperCase();

    const alamat =
    document.getElementById("alamat")
    .value.trim().toUpperCase();

    const password =
    document.getElementById("password")
    .value.trim();

    if(!nama || !alamat || !password){

        showNotif(
        "Lengkapi data login",
        "error");

        return;

    }

    const response =
    await fetch(API_URL,{

        method:"POST",

        body:JSON.stringify({

            action:"login",
            nama:nama,
            alamat:alamat,
            password:password

        })

    });

    const result =
    await response.json();

    if(result.status){

        currentUser = result;

        showNotif(
        "Login berhasil",
        "success");

        document
        .getElementById("loginBox")
        .style.display="none";

        loadCalon();

    }else{

        showNotif(
        result.message,
        "error");

    }

}

// =======================
// LOAD CALON
// =======================
async function loadCalon(){

    const response =
    await fetch(API_URL + "?action=getCalon");

    const data =
    await response.json();

    let html = "";

    data.forEach(calon => {

        html += `

        <div class="col-md-4 mb-4">

            <div class="card card-calon">

                <img
                src="${calon.foto}">

                <div class="card-body">

                    <h4>
                        ${calon.nama}
                    </h4>

                    <h6>Visi</h6>

                    <p>
                        ${calon.visi}
                    </p>

                    <h6>Misi</h6>

                    <p>
                        ${calon.misi}
                    </p>

                    <button
                    class="btn-pilih"
                    onclick="pilihCalon('${calon.nama}')">

                        PILIH

                    </button>

                </div>

            </div>

        </div>

        `;

    });

    document
    .getElementById("listCalon")
    .innerHTML = html;

    document
    .getElementById("calonContainer")
    .style.display = "block";

}

// =======================
// PILIH
// =======================
async function pilihCalon(nama){

    const konfirmasi =
    confirm(
    "Yakin memilih " + nama + " ?");

    if(!konfirmasi) return;

    const response =
    await fetch(API_URL,{

        method:"POST",

        body:JSON.stringify({

            action:"vote",
            idPemilih:currentUser.id,
            pilihan:nama

        })

    });

    const result =
    await response.json();

    if(result.status){

        showNotif(
        "Vote berhasil disimpan",
        "success");

        document
        .getElementById("calonContainer")
        .style.display="none";

        document
        .getElementById("sukses")
        .style.display="block";

    }else{

        showNotif(
        result.message,
        "error");

    }

}

// =======================
// KEMBALI
// =======================
function kembaliHome(){

    location.reload();

}

</script>

</body>
</html>
