<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>E-Voting Komite | SMPN 2 Kawali</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0a1628 0%, #0f1a2f 100%);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }
    .hero-header {
      background: linear-gradient(135deg, #0a2b5e, #021a4a);
      color: white;
      padding: 30px;
      text-align: center;
      border-bottom-left-radius: 30px;
      border-bottom-right-radius: 30px;
    }
    .logo-wrapper {
      width: 100px;
      height: 100px;
      background: white;
      border-radius: 50%;
      margin: 0 auto 15px;
      padding: 10px;
    }
    .logo { width: 80px; height: 80px; object-fit: contain; border-radius: 50%; }
    .glass-card {
      background: rgba(15, 25, 45, 0.95);
      border-radius: 30px;
      padding: 30px;
      max-width: 500px;
      margin: 40px auto;
    }
    .custom-input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 25px;
      border: 1px solid #1e3a5f;
      background: #0f172a;
      color: white;
    }
    .btn-login {
      background: #2563eb;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 25px;
      width: 100%;
      font-weight: bold;
      cursor: pointer;
    }
    .auth-tab-btn {
      background: transparent;
      border: none;
      padding: 10px 20px;
      color: #94a3b8;
      cursor: pointer;
      font-size: 16px;
    }
    .auth-tab-btn.active {
      background: #2563eb;
      color: white;
      border-radius: 25px;
    }
    .candidate-card {
      background: rgba(15, 25, 45, 0.95);
      border-radius: 20px;
      padding: 15px;
      margin-bottom: 20px;
      height: 100%;
    }
    .btn-pilih {
      background: #2563eb;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 20px;
      width: 100%;
      cursor: pointer;
    }
    .stat-card {
      background: rgba(15, 25, 45, 0.95);
      border-radius: 20px;
      padding: 20px;
      text-align: center;
      color: white;
    }
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-card {
      background: #0f172a;
      border-radius: 30px;
      padding: 30px;
      max-width: 400px;
      text-align: center;
      color: white;
    }
    .loading-toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #0f172a;
      border: 1px solid #2563eb;
      color: white;
      padding: 12px 24px;
      border-radius: 30px;
      z-index: 1100;
    }
    .btn-action, .btn-reset {
      border: none;
      padding: 10px;
      border-radius: 20px;
      width: 100%;
      margin-bottom: 10px;
      cursor: pointer;
      font-weight: bold;
    }
    .btn-danger { background: #dc2626; color: white; }
    .btn-success { background: #16a34a; color: white; }
    .btn-reset { background: #dc2626; color: white; }
    .dark-table { width: 100%; border-collapse: collapse; }
    .dark-table th, .dark-table td { border: 1px solid #2d4a7c; padding: 8px; color: white; }
    .dark-table th { background: #1e3a5f; }
    .hasil-table { margin-top: 20px; }
    .logout-btn {
      background: #2563eb;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
    }
    @media (max-width: 768px) {
      .hero-header h2 { font-size: 1.2rem; }
      .col-md-4 { margin-bottom: 15px; }
    }
  </style>
</head>
<body>

<div class="hero-header">
  <div class="logo-wrapper">
    <img src="https://drive.google.com/thumbnail?id=14MOrGVFoEKwDkd66Mg8rv4f4bCIaMALG&sz=w1000" class="logo" alt="Logo">
  </div>
  <h2>PEMILIHAN KOMITE SEKOLAH</h2>
  <h4>SMPN 2 KAWALI</h4>
  <p>Masa Bakti 2026–2031</p>
</div>

<!-- LOGIN AREA -->
<div id="authContainer" class="glass-card">
  <div style="text-align: center; margin-bottom: 20px;">
    <button class="auth-tab-btn active" onclick="switchTab('pemilih')">Pemilih</button>
    <button class="auth-tab-btn" onclick="switchTab('admin')">Admin</button>
  </div>
  
  <div id="pemilihForm">
    <input type="text" id="nama" class="custom-input" placeholder="Nama Lengkap">
    <input type="text" id="alamat" class="custom-input" placeholder="Alamat">
    <input type="password" id="password" class="custom-input" placeholder="Password">
    <button class="btn-login" onclick="handlePemilihLogin()">MASUK & VOTING</button>
  </div>
  
  <div id="adminForm" style="display:none;">
    <input type="text" id="adminUsername" class="custom-input" placeholder="Username Admin">
    <input type="password" id="adminPassword" class="custom-input" placeholder="Password Admin">
    <button class="btn-login" onclick="handleAdminLogin()">MASUK DASHBOARD</button>
  </div>
</div>

<!-- PEMILIH AREA (setelah login) -->
<div id="calonContainer" style="display:none; padding: 20px;">
  <h3 style="color:white; text-align:center;">Pilih Ketua Komite</h3>
  <div class="row" id="listCalon"></div>
</div>

<!-- ADMIN DASHBOARD -->
<div id="adminDashboard" style="display:none; padding: 20px;">
  <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
    <h3 style="color:white;">Dashboard Admin</h3>
    <button class="logout-btn" onclick="adminLogout()">Keluar</button>
  </div>
  <div class="row">
    <div class="col-md-4">
      <div class="stat-card">
        <h3>Total Suara</h3>
        <h2 id="totalSuaraAdmin">0</h2>
      </div>
    </div>
    <div class="col-md-4">
      <div class="stat-card">
        <h3>Status</h3>
        <h2 id="statusVotingAdmin">--</h2>
      </div>
    </div>
    <div class="col-md-4">
      <div class="stat-card">
        <button class="btn-danger btn-action" onclick="tutupVoting()">TUTUP VOTING</button>
        <button class="btn-success btn-action" onclick="bukaVoting()">BUKA VOTING</button>
        <button class="btn-reset" onclick="resetData()">RESET PEMILIH</button>
      </div>
    </div>
  </div>
  <div class="stat-card hasil-table">
    <h4>Hasil Voting</h4>
    <div class="table-responsive">
      <table class="dark-table">
        <thead><tr><th>Rank</th><th>Nama</th><th>Suara</th><th>Jabatan</th></tr></thead>
        <tbody id="hasilTableAdmin"></tbody>
      </table>
    </div>
    <button onclick="downloadExcel()" style="margin-top:15px; background:#2563eb; color:white; border:none; padding:8px 16px; border-radius:20px; cursor:pointer;">Download Excel</button>
  </div>
</div>

<!-- SUKSES VOTE -->
<div id="sukses" style="display:none; text-align:center; padding:50px; color:white;">
  <i class="fas fa-check-circle" style="font-size:70px; color:#22c55e;"></i>
  <h2>TERIMA KASIH</h2>
  <p>Suara Anda berhasil disimpan</p>
  <button onclick="location.reload()" style="background:#2563eb; color:white; border:none; padding:10px 20px; border-radius:20px; cursor:pointer;">Kembali</button>
</div>

<div id="loadingToast" style="display:none;" class="loading-toast">
  <i class="fas fa-spinner fa-pulse"></i> Memproses...
</div>

<script>
// ==================== URL APPS SCRIPT (UPDATE DENGAN URL ANDA) ====================
const API_URL = "https://script.google.com/macros/s/AKfycbwlSgpfOKI5WhPR0f9ePd7G5veuxvFJY_ZHgHrbH37tVugNYr7BGCtEGx2vwtkqTTu2/exec";

let currentUser = null;
let hasVoted = false;
let adminInterval = null;
let isAdmin = false;

function showLoading(msg) {
  let el = document.getElementById("loadingToast");
  el.innerHTML = `<i class="fas fa-spinner fa-pulse"></i> ${msg}`;
  el.style.display = "flex";
}
function hideLoading() { document.getElementById("loadingToast").style.display = "none"; }

function showModal(title, message, isError = false) {
  let modalHtml = `
    <div class="modal-overlay" id="customModal">
      <div class="modal-card">
        <i class="fas ${isError ? 'fa-times-circle' : 'fa-check-circle'}" style="font-size:50px; color:${isError ? '#ef4444' : '#22c55e'}; margin-bottom:15px;"></i>
        <h3>${title}</h3>
        <p>${message}</p>
        <button onclick="document.getElementById('customModal').remove()" style="background:#2563eb; color:white; border:none; padding:8px 20px; border-radius:20px; margin-top:15px; cursor:pointer;">OK</button>
      </div>
    </div>
  `;
  document.body.insertAdjacentHTML("beforeend", modalHtml);
}

function switchTab(tab) {
  const pemilihForm = document.getElementById("pemilihForm");
  const adminForm = document.getElementById("adminForm");
  const btns = document.querySelectorAll(".auth-tab-btn");
  btns.forEach(btn => btn.classList.remove("active"));
  if (tab === "pemilih") {
    pemilihForm.style.display = "block";
    adminForm.style.display = "none";
    btns[0].classList.add("active");
  } else {
    pemilihForm.style.display = "none";
    adminForm.style.display = "block";
    btns[1].classList.add("active");
  }
}

// PEMILIH LOGIN
async function handlePemilihLogin() {
  const nama = document.getElementById("nama").value.trim().toUpperCase();
  const alamat = document.getElementById("alamat").value.trim().toUpperCase();
  const password = document.getElementById("password").value.trim();
  
  if (!nama || !alamat || !password) {
    showModal("Perhatian", "Lengkapi semua data!", true);
    return;
  }
  
  showLoading("Memeriksa data...");
  try {
    const response = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "login", nama, alamat, password })
    });
    const result = await response.json();
    hideLoading();
    
    if (result.status) {
      currentUser = result;
      hasVoted = false;
      showModal("Berhasil", "Login berhasil! Silakan pilih calon.");
      document.getElementById("authContainer").style.display = "none";
      await loadCalon();
    } else {
      showModal("Gagal", result.message, true);
    }
  } catch(e) {
    hideLoading();
    console.error("Login error:", e);
    showModal("Error Koneksi", "Gagal terhubung ke server. Pastikan:\n1. Koneksi internet stabil\n2. URL Apps Script benar\n3. Apps Script sudah di-deploy", true);
  }
}

// LOAD CALON
async function loadCalon() {
  showLoading("Memuat kandidat...");
  try {
    const response = await fetch(API_URL + "?action=getCalon");
    const data = await response.json();
    hideLoading();
    
    let html = "";
    data.forEach(calon => {
      let foto = calon.foto || `https://ui-avatars.com/api/?background=2563eb&color=fff&size=100&name=${encodeURIComponent(calon.nama)}`;
      html += `
        <div class="col-md-4 col-sm-6 mb-3">
          <div class="candidate-card">
            <img src="${foto}" style="width:100px; height:100px; border-radius:50%; display:block; margin:0 auto 10px;">
            <h4 style="color:white; text-align:center;">${escapeHtml(calon.nama)}</h4>
            <div style="background:rgba(255,255,255,0.1); border-radius:15px; padding:10px; margin:10px 0;">
              <small style="color:#60a5fa;">Visi</small>
              <p style="color:#cbd5e1; font-size:12px;">${escapeHtml(calon.visi)}</p>
              <small style="color:#60a5fa;">Misi</small>
              <p style="color:#cbd5e1; font-size:12px;">${escapeHtml(calon.misi)}</p>
            </div>
            <button class="btn-pilih" onclick="confirmVote('${escapeHtml(calon.nama)}')">PILIH</button>
          </div>
        </div>
      `;
    });
    document.getElementById("listCalon").innerHTML = html;
    document.getElementById("calonContainer").style.display = "block";
  } catch(e) {
    hideLoading();
    showModal("Error", "Gagal memuat data calon", true);
  }
}

// KONFIRMASI VOTE
function confirmVote(nama) {
  let modalHtml = `
    <div class="modal-overlay" id="voteModal">
      <div class="modal-card">
        <i class="fas fa-question-circle" style="font-size:50px; color:#60a5fa; margin-bottom:15px;"></i>
        <h3>Konfirmasi Pilihan</h3>
        <p>Yakin memilih <strong>${nama}</strong> sebagai Ketua Komite?</p>
        <p style="color:#f87171; font-size:12px;">Suara tidak dapat diubah!</p>
        <div style="display:flex; gap:10px; justify-content:center; margin-top:20px;">
          <button onclick="document.getElementById('voteModal').remove()" style="background:#334155; color:white; border:none; padding:8px 20px; border-radius:20px; cursor:pointer;">Batal</button>
          <button onclick="processVote('${nama}')" style="background:#2563eb; color:white; border:none; padding:8px 20px; border-radius:20px; cursor:pointer;">Ya, Pilih</button>
        </div>
      </div>
    </div>
  `;
  document.body.insertAdjacentHTML("beforeend", modalHtml);
}

// PROSES VOTE
async function processVote(nama) {
  document.getElementById("voteModal")?.remove();
  if (hasVoted) {
    showModal("Perhatian", "Anda sudah memilih!", true);
    return;
  }
  
  showLoading("Menyimpan suara...");
  try {
    const response = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "vote", idPemilih: currentUser.id, pilihan: nama })
    });
    const result = await response.json();
    hideLoading();
    
    if (result.status) {
      hasVoted = true;
      showModal("Berhasil!", "Suara Anda telah tersimpan. Terima kasih!");
      document.getElementById("calonContainer").style.display = "none";
      document.getElementById("sukses").style.display = "block";
    } else {
      showModal("Gagal", result.message, true);
    }
  } catch(e) {
    hideLoading();
    showModal("Error", "Gagal menyimpan suara", true);
  }
}

// ADMIN LOGIN
async function handleAdminLogin() {
  const user = document.getElementById("adminUsername").value.trim();
  const pass = document.getElementById("adminPassword").value.trim();
  
  if (user === "admin" && pass === "admin123") {
    isAdmin = true;
    document.getElementById("authContainer").style.display = "none";
    document.getElementById("adminDashboard").style.display = "block";
    await loadAdminData();
    if (adminInterval) clearInterval(adminInterval);
    adminInterval = setInterval(loadAdminData, 5000);
  } else {
    showModal("Login Gagal", "Username: admin | Password: admin123", true);
  }
}

// LOAD ADMIN DATA
async function loadAdminData() {
  if (!isAdmin) return;
  try {
    const [hasilRes, statusRes] = await Promise.all([
      fetch(API_URL + "?action=getHasil"),
      fetch(API_URL + "?action=getStatus")
    ]);
    const hasil = await hasilRes.json();
    const status = await statusRes.json();
    
    let arr = Object.entries(hasil).map(([nama, suara]) => ({ nama, suara })).sort((a,b) => b.suara - a.suara);
    let total = arr.reduce((s,i) => s + i.suara, 0);
    
    document.getElementById("totalSuaraAdmin").innerText = total;
    document.getElementById("statusVotingAdmin").innerHTML = status.statusVoting === "OPEN" ? "✅ VOTING DIBUKA" : "🔒 VOTING DITUTUP";
    
    let html = "";
    arr.forEach((item, idx) => {
      let jabatan = idx === 0 ? "Ketua" : idx === 1 ? "Sekretaris" : idx === 2 ? "Bendahara" : "Anggota";
      html += `<tr><td style="border:1px solid #2d4a7c;padding:8px;">${idx+1}</td><td style="border:1px solid #2d4a7c;padding:8px;">${escapeHtml(item.nama)}</td><td style="border:1px solid #2d4a7c;padding:8px;">${item.suara}</td><td style="border:1px solid #2d4a7c;padding:8px;">${jabatan}</td></tr>`;
    });
    document.getElementById("hasilTableAdmin").innerHTML = html;
  } catch(e) { console.error(e); }
}

// FUNGSI ADMIN
async function tutupVoting() {
  showLoading("Menutup voting...");
  await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "closeVoting" }) });
  hideLoading();
  showModal("Berhasil", "Voting ditutup");
  loadAdminData();
}
async function bukaVoting() {
  showLoading("Membuka voting...");
  await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "openVoting" }) });
  hideLoading();
  showModal("Berhasil", "Voting dibuka");
  loadAdminData();
}
async function resetData() {
  showLoading("Meriset data...");
  await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "resetPemilih" }) });
  hideLoading();
  showModal("Berhasil", "Data telah direset");
  loadAdminData();
}
function downloadExcel() {
  let rows = [];
  document.querySelectorAll("#hasilTableAdmin tr").forEach(row => {
    let cells = row.querySelectorAll("td");
    if (cells.length) rows.push([cells[0]?.innerText, cells[1]?.innerText, cells[2]?.innerText, cells[3]?.innerText]);
  });
  let html = `<html><head><meta charset="UTF-8"><title>Hasil Voting</title><style>th,td{border:1px solid black;padding:8px;}</style></head><body><h2>Hasil Voting Komite</h2><table border="1"><thead><tr><th>Rank</th><th>Nama</th><th>Suara</th><th>Jabatan</th></tr></thead><tbody>${rows.map(r => `<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td></tr>`).join('')}</tbody></table></body></html>`;
  let blob = new Blob([html], { type: "application/vnd.ms-excel" });
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `Hasil_Voting_${new Date().toISOString().slice(0,19)}.xls`;
  a.click();
}
function adminLogout() { 
  isAdmin = false; 
  if (adminInterval) clearInterval(adminInterval); 
  document.getElementById("adminDashboard").style.display = "none"; 
  document.getElementById("authContainer").style.display = "block"; 
  switchTab("pemilih"); 
}
function escapeHtml(str) { 
  if (!str) return ""; 
  return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); 
}
</script>
</body>
</html>
