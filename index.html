<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0a0f2a 0%, #0d1b5e 30%, #1a237e 60%, #1565c0 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
    }

    /* HEADER dengan Logo Besar */
    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: white;
      padding: 8px;
      margin-bottom: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .header h1 {
      color: white;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .header h2 {
      color: rgba(255,255,255,0.9);
      font-size: 16px;
      font-weight: 500;
    }

    .header p {
      color: rgba(255,255,255,0.7);
      font-size: 12px;
      margin-top: 5px;
    }

    /* TAB STYLE - SEPERTI PHOTO 1 */
    .tab-container {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
    }

    .tab-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      background: rgba(255,255,255,0.2);
      color: white;
      backdrop-filter: blur(5px);
    }

    .tab-btn.active {
      background: white;
      color: #1a237e;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    /* CARD LOGIN */
    .card {
      background: white;
      border-radius: 25px;
      padding: 30px 25px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    }

    .card h3 {
      color: #1a237e;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 25px;
      text-align: center;
    }

    /* INPUT FIELD */
    .input-group {
      margin-bottom: 15px;
    }

    .input-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #1a237e;
      margin-bottom: 5px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 20px;
      font-size: 15px;
      font-family: 'Poppins', sans-serif;
      transition: all 0.3s;
      background: #f8f9fa;
    }

    input:focus {
      outline: none;
      border-color: #1565c0;
      background: white;
      box-shadow: 0 0 0 3px rgba(21,101,192,0.1);
    }

    /* BUTTON */
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #1a237e, #1565c0);
      color: white;
      border: none;
      border-radius: 25px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .btn-secondary {
      width: 100%;
      padding: 12px;
      background: #eceff1;
      color: #1a237e;
      border: none;
      border-radius: 25px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 10px;
    }

    .btn-vote {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #2e7d32, #43a047);
      color: white;
      border: none;
      border-radius: 20px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }

    .btn-danger {
      background: linear-gradient(135deg, #c62828, #e53935);
      color: white;
    }

    .btn-success {
      background: linear-gradient(135deg, #2e7d32, #43a047);
      color: white;
    }

    /* MESSAGE */
    .message {
      text-align: center;
      margin-top: 15px;
      padding: 10px;
      border-radius: 15px;
      font-size: 13px;
    }

    .message.error {
      background: #ffebee;
      color: #c62828;
    }

    .message.success {
      background: #e8f5e9;
      color: #2e7d32;
    }

    /* WELCOME BANNER */
    .welcome-banner {
      background: white;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
      text-align: center;
    }

    .welcome-banner h3 {
      color: #1a237e;
      margin-bottom: 5px;
    }

    /* CANDIDATES GRID */
    .candidates-grid {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .candidate-card {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    .candidate-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .candidate-card h4 {
      padding: 15px;
      background: linear-gradient(135deg, #1a237e, #283593);
      color: white;
      font-size: 16px;
    }

    .visi-misi {
      padding: 15px;
      font-size: 12px;
      line-height: 1.6;
      color: #424242;
    }

    .visi-misi strong {
      color: #1a237e;
      display: block;
      margin-top: 10px;
    }

    /* LOADING */
    .loading-spinner {
      text-align: center;
      padding: 40px;
      background: white;
      border-radius: 20px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e0e0e0;
      border-top-color: #1a237e;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ADMIN PANEL */
    .stats-card {
      display: flex;
      justify-content: space-around;
      background: linear-gradient(135deg, #1a237e, #0d47a1);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
      color: white;
      text-align: center;
    }

    .stat-value {
      font-size: 28px;
      font-weight: bold;
    }

    .voting-control {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .voting-control button {
      flex: 1;
    }

    .chart-container {
      background: white;
      border-radius: 20px;
      padding: 15px;
      margin-bottom: 20px;
    }

    .rekap-container {
      background: white;
      border-radius: 20px;
      padding: 20px;
    }

    .rekap-table {
      width: 100%;
      border-collapse: collapse;
    }

    .rekap-table th, .rekap-table td {
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid #eee;
    }

    .rekap-table th {
      background: #1a237e;
      color: white;
    }

    .total-row {
      background: #e8eaf6;
      font-weight: bold;
    }
  </style>
  <title>Voting Komite SMPN 2 Kawali</title>
</head>
<body>
<div class="container">
  <!-- HEADER dengan Logo -->
  <div class="header">
    <img src="https://drive.google.com/uc?export=view&id=1nlVZtT1OQJKcX61ylMOkufbIE9x2MK6k" alt="Logo Sekolah" class="logo" onerror="this.src='https://placehold.co/100x100/1a237e/white?text=Logo'">
    <h1>PEMILIHAN KOMITE SEKOLAH</h1>
    <h2>SMPN 2 KAWALI</h2>
    <p>Masa Bakti 2026–2031</p>
  </div>

  <!-- TAB Pemilih & Admin -->
  <div class="tab-container">
    <button class="tab-btn active" onclick="showTab('pemilih')">🗳️ Pemilih</button>
    <button class="tab-btn" onclick="showTab('admin')">👑 Admin</button>
  </div>

  <!-- PANEL PEMILIH -->
  <div id="panelPemilih">
    <div id="loginForm" class="card">
      <h3>🔐 LOGIN PEMILIH</h3>
      <div class="input-group">
        <label>Nama Lengkap</label>
        <input type="text" id="nama" placeholder="Masukkan nama lengkap">
      </div>
      <div class="input-group">
        <label>Alamat</label>
        <input type="text" id="alamat" placeholder="Masukkan alamat">
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Password">
      </div>
      <button onclick="doLogin()" class="btn-primary">✅ MASUK & VOTING</button>
      <div id="loginMessage" class="message"></div>
    </div>

    <div id="votingPanel" style="display:none;">
      <div class="welcome-banner">
        <h3>Selamat Datang, <span id="userName"></span>!</h3>
        <p>Silakan pilih calon komite favorit Anda</p>
      </div>
      <div id="candidatesGrid" class="candidates-grid">
        <div class="loading-spinner"><div class="spinner"></div><p>Memuat data calon...</p></div>
      </div>
      <button onclick="logout()" class="btn-secondary" style="margin-top:20px;">← Keluar</button>
    </div>
  </div>

  <!-- PANEL ADMIN -->
  <div id="panelAdmin" style="display:none;">
    <div id="adminLoginForm" class="card">
      <h3>👑 LOGIN ADMIN</h3>
      <div class="input-group">
        <label>Username</label>
        <input type="text" id="adminUser" placeholder="Username">
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="adminPass" placeholder="Password">
      </div>
      <button onclick="doAdminLogin()" class="btn-primary">MASUK</button>
      <div id="adminMessage" class="message"></div>
    </div>

    <div id="adminPanel" style="display:none;">
      <div class="stats-card">
        <div><span class="stat-label">📋 Pemilih</span><div class="stat-value" id="totalPemilih">0</div></div>
        <div><span class="stat-label">✅ Suara</span><div class="stat-value" id="totalSuara">0</div></div>
        <div><span class="stat-label">📈 Partisipasi</span><div class="stat-value" id="persentase">0%</div></div>
      </div>
      <div class="voting-control">
        <button id="toggleVotingBtn" onclick="toggleVoting()" class="btn-primary">Loading...</button>
        <button onclick="resetVoting()" class="btn-danger">🔄 Reset</button>
      </div>
      <div class="chart-container">
        <canvas id="hasilChart"></canvas>
      </div>
      <div class="rekap-container">
        <h4 style="margin-bottom:15px;">🏆 HASIL REKAP SUARA</h4>
        <div id="rekapSuara"></div>
      </div>
      <button onclick="adminLogout()" class="btn-secondary" style="margin-top:20px;">← Keluar</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
  let currentUser = null;
  let hasilChart = null;

  function showTab(tab) {
    if (tab === 'pemilih') {
      document.getElementById('panelPemilih').style.display = 'block';
      document.getElementById('panelAdmin').style.display = 'none';
      document.querySelectorAll('.tab-btn')[0].classList.add('active');
      document.querySelectorAll('.tab-btn')[1].classList.remove('active');
    } else {
      document.getElementById('panelPemilih').style.display = 'none';
      document.getElementById('panelAdmin').style.display = 'block';
      document.querySelectorAll('.tab-btn')[1].classList.add('active');
      document.querySelectorAll('.tab-btn')[0].classList.remove('active');
    }
  }

  // ==================== PEMILIH ====================
  function doLogin() {
    const nama = document.getElementById('nama').value.trim();
    const alamat = document.getElementById('alamat').value.trim();
    const password = document.getElementById('password').value;

    if (!nama) { showMessage('loginMessage', 'Nama harus diisi!', 'error'); return; }
    if (!alamat) { showMessage('loginMessage', 'Alamat harus diisi!', 'error'); return; }
    if (!password) { showMessage('loginMessage', 'Password harus diisi!', 'error'); return; }

    showMessage('loginMessage', '⏳ Memproses...', 'info');
    
    google.script.run
      .withSuccessHandler(function(res) {
        if (res.success) {
          currentUser = { id: res.pemilihId, nama: res.nama, alamat: res.alamat };
          document.getElementById('loginForm').style.display = 'none';
          document.getElementById('votingPanel').style.display = 'block';
          document.getElementById('userName').innerText = currentUser.nama;
          loadCandidates();
        } else {
          showMessage('loginMessage', res.message, 'error');
        }
      })
      .withFailureHandler(function() { showMessage('loginMessage', 'Error koneksi!', 'error'); })
      .loginPemilih(nama, alamat, password);
  }

  function loadCandidates() {
    const grid = document.getElementById('candidatesGrid');
    grid.innerHTML = '<div class="loading-spinner"><div class="spinner"></div><p>Memuat data calon...</p></div>';
    
    google.script.run
      .withSuccessHandler(function(data) {
        if (!data || data.length === 0) {
          grid.innerHTML = '<p style="text-align:center;padding:40px;">Data calon belum tersedia</p>';
          return;
        }
        grid.innerHTML = '';
        data.forEach(function(calon) {
          var card = document.createElement('div');
          card.className = 'candidate-card';
          card.innerHTML = '<img src="' + calon.foto + '" alt="' + calon.nama + '" onerror="this.src=\'https://placehold.co/400x200/1a237e/white?text=Calon\'">' +
            '<h4>' + calon.nama + '</h4>' +
            '<div class="visi-misi">' +
            '<strong>🌟 VISI</strong><p>' + calon.visi.substring(0, 100) + (calon.visi.length > 100 ? '...' : '') + '</p>' +
            '<strong>📌 MISI</strong><p>' + calon.misi.substring(0, 100) + (calon.misi.length > 100 ? '...' : '') + '</p>' +
            '</div>' +
            '<button onclick="vote(' + calon.id + ')" class="btn-vote">🗳️ PILIH</button>';
          grid.appendChild(card);
        });
      })
      .withFailureHandler(function() { grid.innerHTML = '<p style="text-align:center;color:red;">Gagal memuat data</p>'; })
      .getCalon();
  }

  function vote(calonId) {
    if (!confirm('Yakin memilih calon ini? Suara tidak dapat diubah!')) return;
    google.script.run
      .withSuccessHandler(function(res) {
        alert(res.message);
        if (res.success) logout();
      })
      .vote(currentUser.id, calonId, currentUser.nama, currentUser.alamat);
  }

  function logout() {
    currentUser = null;
    document.getElementById('votingPanel').style.display = 'none';
    document.getElementById('loginForm').style.display = 'block';
    document.getElementById('nama').value = '';
    document.getElementById('alamat').value = '';
    document.getElementById('password').value = '';
  }

  // ==================== ADMIN ====================
  function doAdminLogin() {
    var username = document.getElementById('adminUser').value;
    var password = document.getElementById('adminPass').value;
    google.script.run
      .withSuccessHandler(function(res) {
        if (res.success) {
          document.getElementById('adminLoginForm').style.display = 'none';
          document.getElementById('adminPanel').style.display = 'block';
          loadAdminData();
        } else {
          showMessage('adminMessage', 'Username/password salah!', 'error');
        }
      })
      .loginAdmin(username, password);
  }

  function loadAdminData() {
    google.script.run.withSuccessHandler(function(status) {
      var toggleBtn = document.getElementById('toggleVotingBtn');
      toggleBtn.innerText = status ? '🔒 TUTUP VOTING' : '🔓 BUKA VOTING';
      toggleBtn.className = status ? 'btn-danger' : 'btn-success';
    }).getVotingStatus();
    
    google.script.run.withSuccessHandler(function(stat) {
      document.getElementById('totalPemilih').innerText = stat.totalPemilih;
      document.getElementById('totalSuara').innerText = stat.totalSuara;
      document.getElementById('persentase').innerText = stat.persentase + '%';
    }).getStatistik();
    
    google.script.run.withSuccessHandler(function(hasil) {
      updateRekap(hasil);
      updateChart(hasil);
    }).getHasilVoting();
  }

  function updateRekap(hasil) {
    var container = document.getElementById('rekapSuara');
    if (!hasil || hasil.length === 0) { container.innerHTML = '<p>Belum ada suara</p>'; return; }
    var html = '<table class="rekap-table"><tr><th>Posisi</th><th>Nama Calon</th><th>Suara</th></tr>';
    for (var i = 0; i < hasil.length; i++) {
      html += '<tr><td>' + (hasil[i].posisi || '-') + '</td><td>' + hasil[i].nama + '</td><td>' + hasil[i].suara + '</td></tr>';
    }
    var total = hasil.reduce(function(s,c) { return s + c.suara; }, 0);
    html += '<tr class="total-row"><td colspan="2">Total</td><td>' + total + '</td></tr></table>';
    container.innerHTML = html;
  }

  function updateChart(hasil) {
    var ctx = document.getElementById('hasilChart').getContext('2d');
    if (hasilChart) hasilChart.destroy();
    if (!hasil || hasil.length === 0) return;
    hasilChart = new Chart(ctx, {
      type: 'bar',
      data: { labels: hasil.map(function(c) { return c.nama.split(' ')[0]; }), datasets: [{ label: 'Suara', data: hasil.map(function(c) { return c.suara; }), backgroundColor: '#1a237e', borderRadius: 8 }] },
      options: { responsive: true, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
    });
  }

  function toggleVoting() {
    google.script.run.withSuccessHandler(function(status) {
      google.script.run.withSuccessHandler(function(newStatus) {
        var btn = document.getElementById('toggleVotingBtn');
        btn.innerText = newStatus ? '🔒 TUTUP VOTING' : '🔓 BUKA VOTING';
        btn.className = newStatus ? 'btn-danger' : 'btn-success';
        alert(newStatus ? 'Voting DIBUKA' : 'Voting DITUTUP');
      }).setVotingStatus(!status);
    }).getVotingStatus();
  }

  function resetVoting() {
    if (confirm('RESET semua data voting? TIDAK BISA DIURUNGKAN!')) {
      google.script.run.withSuccessHandler(function() {
        alert('Voting telah direset!');
        loadAdminData();
      }).resetVoting();
    }
  }

  function adminLogout() {
    document.getElementById('adminPanel').style.display = 'none';
    document.getElementById('adminLoginForm').style.display = 'block';
    document.getElementById('adminUser').value = '';
    document.getElementById('adminPass').value = '';
    showTab('pemilih');
  }

  function showMessage(elId, msg, type) {
    var el = document.getElementById(elId);
    if (el) { el.innerText = msg; el.className = 'message ' + type; setTimeout(function() { el.innerText = ''; el.className = 'message'; }, 3000); }
  }
</script>
</body>
</html>
