<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Voting Komite SMPN 2 Kawali</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f2f5f9;
    font-family:Arial, sans-serif;
}

.header{
    background:linear-gradient(135deg,#b30000,#ff3b3b);
    color:white;
    padding:30px;
    text-align:center;
    border-radius:0 0 20px 20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.login-box{
    max-width:400px;
    margin:30px auto;
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.calon-container{
    display:none;
    padding:20px;
}

.card-calon{
    border:none;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card-calon:hover{
    transform:translateY(-5px);
}

.card-calon img{
    width:100%;
    height:300px;
    object-fit:cover;
}

.btn-pilih{
    background:#b30000;
    color:white;
    border:none;
    width:100%;
    border-radius:10px;
    padding:10px;
    font-weight:bold;
}

.btn-pilih:hover{
    background:#ff3b3b;
}

.sukses{
    display:none;
    text-align:center;
    padding:50px;
}

</style>
</head>
<body>

<div class="header">
    <h2>PEMILIHAN KOMITE SEKOLAH</h2>
    <h4>SMPN 2 KAWALI</h4>
    <p>Masa Bakti 2026–2031</p>
</div>

<!-- LOGIN -->
<div class="login-box" id="loginBox">

    <h4 class="text-center mb-4">LOGIN PESERTA</h4>

    <input type="text" id="nama" class="form-control mb-3" placeholder="NAMA LENGKAP">

    <input type="text" id="alamat" class="form-control mb-3" placeholder="ALAMAT / TEMPAT TINGGAL">

    <input type="password" id="password" class="form-control mb-3" placeholder="PASSWORD">

    <button class="btn btn-danger w-100" onclick="login()">LOGIN</button>

</div>

<!-- CALON -->
<div class="container calon-container" id="calonContainer">

    <div class="row" id="listCalon"></div>

</div>

<!-- SUKSES -->
<div class="sukses" id="sukses">

    <h1>✅</h1>

    <h2>TERIMA KASIH</h2>

    <p>Suara Anda berhasil disimpan.</p>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbz--tv1s4lU-eUMJTlmskNoMtC4u_ndjez--EULA489xYwvKTQqg3QBTEP0OBL-3Cd0/exec";

let currentUser = null;

// =======================
// LOGIN
// =======================
async function login(){

    const nama = document.getElementById("nama").value.trim().toUpperCase();
    const alamat = document.getElementById("alamat").value.trim().toUpperCase();
    const password = document.getElementById("password").value.trim();

    if(!nama || !alamat || !password){
        alert("Lengkapi data");
        return;
    }

    const response = await fetch(API_URL,{
        method:"POST",
        body:JSON.stringify({
            action:"login",
            nama:nama,
            alamat:alamat,
            password:password
        })
    });

    const result = await response.json();

    if(result.status){

        currentUser = result;

        document.getElementById("loginBox").style.display="none";

        loadCalon();

    }else{
        alert(result.message);
    }

}

// =======================
// LOAD CALON
// =======================
async function loadCalon(){

    const response = await fetch(API_URL + "?action=getCalon");

    const data = await response.json();

    let html = "";

    data.forEach(calon => {

        html += `
        
        <div class="col-md-4 mb-4">

            <div class="card card-calon">

                <img src="${calon.foto}" alt="foto">

                <div class="card-body">

                    <h4>${calon.nama}</h4>

                    <h6>Visi</h6>
                    <p>${calon.visi}</p>

                    <h6>Misi</h6>
                    <p>${calon.misi}</p>

                    <button class="btn-pilih"
                    onclick="pilihCalon('${calon.nama}')">
                    PILIH
                    </button>

                </div>

            </div>

        </div>
        
        `;

    });

    document.getElementById("listCalon").innerHTML = html;

    document.getElementById("calonContainer").style.display="block";

}

// =======================
// PILIH
// =======================
async function pilihCalon(nama){

    const konfirmasi = confirm(
        "Yakin memilih " + nama + " ?"
    );

    if(!konfirmasi) return;

    const response = await fetch(API_URL,{
        method:"POST",
        body:JSON.stringify({
            action:"vote",
            idPemilih:currentUser.id,
            pilihan:nama
        })
    });

    const result = await response.json();

    if(result.status){

        document.getElementById("calonContainer").style.display="none";

        document.getElementById("sukses").style.display="block";

    }else{
        alert(result.message);
    }

}

</script>

</body>
</html>
