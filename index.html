<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>E-Voting Komite | SMPN 2 Kawali</title>
  <!-- Bootstrap 5 + Font Awesome + Google Fonts -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #f0f4fa 0%, #e8edf5 100%);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* HEADER ELEGAN */
    .hero-header {
      background: radial-gradient(circle at 20% 30%, #b02a2a, #631111);
      color: white;
      padding: 35px 20px 40px;
      text-align: center;
      border-bottom-left-radius: 48px;
      border-bottom-right-radius: 48px;
      box-shadow: 0 15px 35px -10px rgba(0,0,0,0.25);
      position: relative;
      overflow: hidden;
    }
    .hero-header::after {
      content: "🗳️";
      font-size: 170px;
      opacity: 0.07;
      position: absolute;
      bottom: -35px;
      right: -15px;
      pointer-events: none;
    }
    .logo-wrapper {
      width: 110px;
      height: 110px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 18px;
      box-shadow: 0 15px 25px rgba(0,0,0,0.2);
    }
    .logo {
      width: 92px;
      height: 92px;
      object-fit: contain;
      border-radius: 50%;
    }
    .hero-header h2 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .hero-header h4 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-top: 5px;
    }

    /* TAB STYLE */
    .auth-tabs {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 25px;
      border-bottom: none;
    }
    .auth-tab-btn {
      background: transparent;
      border: none;
      padding: 12px 32px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 50px;
      transition: all 0.25s;
      color: #64748b;
      cursor: pointer;
    }
    .auth-tab-btn.active {
      background: linear-gradient(105deg, #b22222, #dc3c3c);
      color: white;
      box-shadow: 0 5px 12px rgba(178,34,34,0.3);
    }
    .auth-tab-btn:not(.active):hover {
      background: #e2e8f0;
      color: #1e293b;
    }

    /* LOGIN CARD */
    .glass-card {
      background: rgba(255,255,255,0.98);
      backdrop-filter: blur(2px);
      border-radius: 48px;
      box-shadow: 0 25px 45px -15px rgba(0,0,0,0.2);
    }
    .login-box {
      max-width: 500px;
      margin: 40px auto;
      padding: 35px 32px;
    }
    .login-icon {
      background: #b2222218;
      width: 75px;
      height: 75px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 18px;
      color: #b22222;
      font-size: 34px;
    }
    .custom-input {
      width: 100%;
      padding: 14px 22px;
      border-radius: 44px;
      border: 1.8px solid #e2edf7;
      background: #ffffff;
      font-size: 1rem;
      transition: 0.2s;
      outline: none;
      margin-bottom: 18px;
    }
    .custom-input:focus {
      border-color: #b22222;
      box-shadow: 0 0 0 4px rgba(178,34,34,0.12);
    }
    .btn-login {
      background: linear-gradient(105deg, #b22222, #dc3c3c);
      border: none;
      border-radius: 48px;
      padding: 14px;
      font-weight: 700;
      font-size: 1rem;
      width: 100%;
      transition: 0.25s;
      color: white;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      filter: brightness(1.02);
      box-shadow: 0 8px 18px rgba(178,34,34,0.3);
    }

    /* CALON CARD */
    .calon-container {
      padding: 40px 15px 70px;
    }
    .section-title {
      text-align: center;
      margin-bottom: 40px;
    }
    .section-title span {
      background: #b2222215;
      padding: 6px 24px;
      border-radius: 60px;
      font-weight: 600;
      color: #b22222;
      font-size: 0.85rem;
    }
    .candidate-card {
      border: none;
      border-radius: 38px;
      background: #ffffff;
      transition: all 0.35s ease;
      overflow: hidden;
      box-shadow: 0 15px 30px -10px rgba(0,0,0,0.1);
      height: 100%;
    }
    .candidate-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 25px 35px -12px rgba(0,0,0,0.2);
    }
    .candidate-img {
      background: #fafdff;
      padding: 25px 20px 15px;
      text-align: center;
    }
    .candidate-img img {
      width: 140px;
      height: 140px;
      object-fit: cover;
      border-radius: 50%;
      border: 4px solid white;
      box-shadow: 0 8px 18px rgba(0,0,0,0.1);
    }
    .card-body-custom {
      padding: 20px 22px 28px;
    }
    .candidate-name {
      font-size: 1.5rem;
      font-weight: 800;
      text-align: center;
      color: #0f1a2a;
      margin-bottom: 16px;
    }
    .visi-misi-box {
      background: #f8fafd;
      border-radius: 24px;
      padding: 12px 16px;
      margin-bottom: 14px;
    }
    .visi-misi-box h6 {
      font-weight: 800;
      color: #b91c1c;
      margin-bottom: 6px;
      font-size: 0.9rem;
    }
    .visi-misi-box p {
      font-size: 0.85rem;
      line-height: 1.5;
      text-align: justify;
      color: #1f2a41;
    }
    .btn-pilih-modern {
      background: linear-gradient(115deg, #b22222, #e04545);
      border: none;
      border-radius: 44px;
      padding: 12px;
      font-weight: 700;
      color: white;
      width: 100%;
      margin-top: 12px;
      transition: 0.2s;
    }
    .btn-pilih-modern:hover {
      transform: scale(0.98);
      background: #971c1c;
    }

    /* MODAL KONFIRMASI */
    .custom-modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(10px);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }
    .modal-confirm-card {
      background: white;
      max-width: 450px;
      width: 90%;
      border-radius: 48px;
      padding: 32px 28px;
      text-align: center;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .modal-icon {
      background: #fff0e6;
      width: 75px;
      height: 75px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 38px;
      color: #b22222;
    }
    .modal-confirm-card h3 {
      font-weight: 800;
      font-size: 1.7rem;
    }
    .candidate-name-highlight {
      background: #f1f5f9;
      padding: 8px 18px;
      border-radius: 60px;
      display: inline-block;
      font-weight: 800;
      color: #b22222;
      margin: 12px 0;
    }
    .modal-actions {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-top: 20px;
    }
    .btn-cancel {
      background: #eef2ff;
      border: none;
      padding: 12px 28px;
      border-radius: 44px;
      font-weight: 600;
    }
    .btn-confirm {
      background: linear-gradient(105deg, #b22222, #dd4040);
      border: none;
      padding: 12px 28px;
      border-radius: 44px;
      font-weight: 700;
      color: white;
    }

    /* ADMIN DASHBOARD */
    .admin-dashboard {
      display: none;
      padding: 25px 20px 50px;
    }
    .stat-card {
      background: white;
      border-radius: 28px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    }
    .stat-number {
      font-size: 2.8rem;
      font-weight: 800;
      color: #b91c1c;
    }
    .btn-action {
      border-radius: 40px;
      padding: 10px;
      font-weight: 600;
      width: 100%;
      margin-bottom: 8px;
    }
    .hasil-table {
      background: white;
      border-radius: 28px;
      padding: 20px;
      margin-top: 20px;
    }
    .refresh-timer {
      font-size: 0.7rem;
      color: #64748b;
    }
    .logout-btn {
      background: #1e293b;
      border: none;
      border-radius: 40px;
      padding: 8px 20px;
      color: white;
      font-weight: 600;
      margin-bottom: 15px;
    }
    .loading-toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: white;
      padding: 12px 28px;
      border-radius: 60px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 2100;
      font-weight: 500;
    }
    .success-panel {
      text-align: center;
      padding: 60px 20px;
    }
    @media (max-width: 768px) {
      .hero-header h2 { font-size: 1.5rem; }
      .candidate-name { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="hero-header">
  <div class="logo-wrapper">
    <img src="https://drive.google.com/thumbnail?id=14MOrGVFoEKwDkd66Mg8rv4f4bCIaMALG&sz=w1000" class="logo" alt="Logo">
  </div>
  <h2>PEMILIHAN KOMITE SEKOLAH</h2>
  <h4>SMPN 2 KAWALI</h4>
  <p>Masa Bakti 2026–2031 • Suara Berintegritas</p>
</div>

<!-- AREA LOGIN (PEMILIH & ADMIN dalam 1 card) -->
<div id="authContainer" class="login-box glass-card">
  <div class="login-icon"><i class="fas fa-fingerprint"></i></div>
  
  <div class="auth-tabs">
    <button class="auth-tab-btn active" data-tab="pemilih" onclick="switchTab('pemilih')">
      <i class="fas fa-user-check"></i> Pemilih
    </button>
    <button class="auth-tab-btn" data-tab="admin" onclick="switchTab('admin')">
      <i class="fas fa-user-shield"></i> Admin
    </button>
  </div>

  <!-- Form PEMILIH -->
  <div id="pemilihForm">
    <input type="text" id="nama" class="custom-input" placeholder="Nama Lengkap" autocomplete="off">
    <input type="text" id="alamat" class="custom-input" placeholder="Alamat / Tempat Tinggal">
    <input type="password" id="password" class="custom-input" placeholder="Password">
    <button class="btn-login" onclick="handlePemilihLogin()">
      <i class="fas fa-arrow-right-to-bracket"></i> Masuk & Voting
    </button>
  </div>

  <!-- Form ADMIN (tersembunyi) -->
  <div id="adminForm" style="display:none;">
    <input type="text" id="adminUsername" class="custom-input" placeholder="Username Admin">
    <input type="password" id="adminPassword" class="custom-input" placeholder="Password Admin">
    <button class="btn-login" onclick="handleAdminLogin()">
      <i class="fas fa-chart-line"></i> Masuk ke Dashboard Admin
    </button>
  </div>
</div>

<!-- AREA PEMILIH (Setelah login) -->
<div id="calonContainer" class="container calon-container" style="display:none;">
  <div class="section-title">
    <span><i class="fas fa-users-viewfinder"></i> Kandidat Ketua Komite</span>
    <h2 class="mt-2">Pilih Pemimpin Terbaik</h2>
  </div>
  <div class="row g-4" id="listCalon"></div>
</div>

<!-- AREA ADMIN DASHBOARD -->
<div id="adminDashboard" class="container admin-dashboard">
  <div class="d-flex justify-content-end">
    <button class="logout-btn" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> Keluar Admin</button>
  </div>
  <div class="row g-4 mb-4">
    <div class="col-md-4">
      <div class="stat-card"><i class="fas fa-vote-yea fa-2x" style="color:#b91c1c;"></i>
        <div class="stat-number" id="totalSuaraAdmin">0</div><div class="stat-label">Total Suara</div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="stat-card"><i class="fas fa-toggle-on fa-2x" style="color:#b91c1c;"></i>
        <div id="statusVotingAdmin" class="fw-bold fs-4 mt-2">--</div><div class="stat-label">Status Voting</div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="stat-card">
        <button class="btn btn-danger btn-action" onclick="tutupVotingAdmin()"><i class="fas fa-lock"></i> TUTUP VOTING</button>
        <button class="btn btn-success btn-action" onclick="bukaVotingAdmin()"><i class="fas fa-lock-open"></i> BUKA VOTING</button>
      </div>
    </div>
  </div>
  <div class="row">
    <div class="col-lg-5">
      <div class="hasil-table"><h5><i class="fas fa-chart-pie"></i> Grafik Suara</h5><canvas id="voteChart"></canvas></div>
    </div>
    <div class="col-lg-7">
      <div class="hasil-table"><h5><i class="fas fa-trophy"></i> Hasil Realtime</h5>
        <table class="table table-bordered"><thead><tr><th>Rank</th><th>Nama</th><th>Suara</th><th>Jabatan</th></tr></thead><tbody id="hasilTableAdmin"></tbody></table>
        <button class="btn btn-primary mt-2" onclick="downloadExcelAdmin()"><i class="fas fa-file-excel"></i> Download Excel</button>
        <button class="btn btn-secondary mt-2" onclick="window.print()"><i class="fas fa-print"></i> Print</button>
      </div>
    </div>
  </div>
</div>

<!-- SUKSES VOTE -->
<div id="sukses" style="display:none;" class="success-panel">
  <i class="fas fa-check-circle" style="font-size:70px; color:#2b6e3c;"></i>
  <h2 class="fw-bold mt-3" style="color:#b22222;">TERIMA KASIH</h2>
  <p>Suara Anda berhasil disimpan</p>
  <button class="btn btn-dark rounded-pill px-4 py-2" onclick="kembaliHome()">Kembali ke Awal</button>
</div>

<div id="loadingToast" class="loading-toast" style="display:none;"><i class="fas fa-spinner fa-pulse"></i> <span>Memproses...</span></div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbz--tv1s4lU-eUMJTlmskNoMtC4u_ndjez--EULA489xYwvKTQqg3QBTEP0OBL-3Cd0/exec";
  let currentUser = null;
  let pendingCandidate = null;
  let voteChartInstance = null;
  let adminRefreshInterval = null;
  let isAdminMode = false;

  function showLoading(msg = "Memproses...") {
    let el = document.getElementById("loadingToast");
    el.querySelector("span").innerText = msg;
    el.style.display = "flex";
  }
  function hideLoading() { document.getElementById("loadingToast").style.display = "none"; }
  function showNotif(msg, type) { alert(msg); } // sederhana

  function switchTab(tab) {
    const pemilihForm = document.getElementById("pemilihForm");
    const adminForm = document.getElementById("adminForm");
    const btns = document.querySelectorAll(".auth-tab-btn");
    btns.forEach(btn => btn.classList.remove("active"));
    if (tab === "pemilih") {
      pemilihForm.style.display = "block";
      adminForm.style.display = "none";
      document.querySelector(".auth-tab-btn[data-tab='pemilih']").classList.add("active");
    } else {
      pemilihForm.style.display = "none";
      adminForm.style.display = "block";
      document.querySelector(".auth-tab-btn[data-tab='admin']").classList.add("active");
    }
  }

  // PEMILIH LOGIN
  async function handlePemilihLogin() {
    const nama = document.getElementById("nama").value.trim().toUpperCase();
    const alamat = document.getElementById("alamat").value.trim().toUpperCase();
    const password = document.getElementById("password").value.trim();
    if (!nama || !alamat || !password) { alert("Lengkapi data!"); return; }
    showLoading("Memeriksa data...");
    try {
      const resp = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "login", nama, alamat, password }) });
      const result = await resp.json();
      hideLoading();
      if (result.status) {
        currentUser = result;
        alert("Login berhasil! Silakan pilih calon.");
        document.getElementById("authContainer").style.display = "none";
        await loadCalonPemilih();
      } else { alert(result.message); }
    } catch(e) { hideLoading(); alert("Gagal koneksi"); }
  }

  async function loadCalonPemilih() {
    showLoading("Memuat kandidat...");
    try {
      const resp = await fetch(API_URL + "?action=getCalon");
      const data = await resp.json();
      hideLoading();
      let html = "";
      data.forEach(calon => {
        let foto = calon.foto || `https://ui-avatars.com/api/?background=b91c1c&color=fff&rounded=true&size=120&name=${encodeURIComponent(calon.nama)}`;
        html += `<div class="col-md-6 col-lg-4"><div class="candidate-card"><div class="candidate-img"><img src="${foto}"></div><div class="card-body-custom"><div class="candidate-name">${escapeHtml(calon.nama)}</div><div class="visi-misi-box"><h6>Visi</h6><p>${escapeHtml(calon.visi || "-")}</p></div><div class="visi-misi-box"><h6>Misi</h6><p>${escapeHtml(calon.misi || "-")}</p></div><button class="btn-pilih-modern" data-nama="${escapeHtml(calon.nama)}"><i class="fas fa-vote-yea"></i> Pilih</button></div></div></div>`;
      });
      document.getElementById("listCalon").innerHTML = html;
      document.getElementById("calonContainer").style.display = "block";
      document.querySelectorAll(".btn-pilih-modern").forEach(btn => {
        btn.addEventListener("click", () => openConfirmModal(btn.getAttribute("data-nama")));
      });
    } catch(e) { hideLoading(); alert("Gagal muat calon"); }
  }

  function openConfirmModal(nama) {
    pendingCandidate = nama;
    let modalHtml = `<div class="custom-modal-overlay" id="confirmModal"><div class="modal-confirm-card"><div class="modal-icon"><i class="fas fa-ballot"></i></div><h3>Konfirmasi Pilihan</h3><div class="candidate-name-highlight">${nama}</div><p>Yakin memilih sebagai Ketua Komite?<br>Suara tidak dapat diubah.</p><div class="modal-actions"><button class="btn-cancel" id="modalCancelBtn">Batal</button><button class="btn-confirm" id="modalConfirmBtn">Ya, Pilih</button></div></div></div>`;
    document.body.insertAdjacentHTML("beforeend", modalHtml);
    const modal = document.getElementById("confirmModal");
    modal.style.display = "flex";
    document.getElementById("modalCancelBtn").onclick = () => { modal.remove(); };
    document.getElementById("modalConfirmBtn").onclick = async () => { modal.remove(); await executeVote(); };
  }

  async function executeVote() {
    if (!currentUser || !pendingCandidate) return;
    showLoading("Menyimpan suara...");
    try {
      const resp = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "vote", idPemilih: currentUser.id, pilihan: pendingCandidate }) });
      const result = await resp.json();
      hideLoading();
      if (result.status) {
        alert("Vote berhasil! Terima kasih.");
        document.getElementById("calonContainer").style.display = "none";
        document.getElementById("sukses").style.display = "block";
      } else { alert(result.message); }
    } catch(e) { hideLoading(); alert("Gagal vote"); }
  }

  // ADMIN LOGIN
  async function handleAdminLogin() {
    const user = document.getElementById("adminUsername").value.trim();
    const pass = document.getElementById("adminPassword").value.trim();
    // hardcoded admin (bisa disesuaikan)
    if (user === "admin" && pass === "admin123") {
      isAdminMode = true;
      document.getElementById("authContainer").style.display = "none";
      document.getElementById("adminDashboard").style.display = "block";
      loadAdminData();
      if (adminRefreshInterval) clearInterval(adminRefreshInterval);
      adminRefreshInterval = setInterval(loadAdminData, 5000);
    } else { alert("Username atau password admin salah!"); }
  }

  async function loadAdminData() {
    if (!isAdminMode) return;
    try {
      const [hasilRes, statusRes] = await Promise.all([
        fetch(API_URL + "?action=getHasil"),
        fetch(API_URL + "?action=getStatus")
      ]);
      const hasil = await hasilRes.json();
      const status = await statusRes.json();
      let arr = Object.entries(hasil).map(([nama, suara]) => ({ nama, suara })).sort((a,b)=>b.suara-a.suara);
      let total = arr.reduce((sum,item)=>sum+item.suara,0);
      document.getElementById("totalSuaraAdmin").innerText = total;
      document.getElementById("statusVotingAdmin").innerHTML = status.statusVoting === "OPEN" ? '<span class="badge bg-success fs-6">✅ VOTING DIBUKA</span>' : '<span class="badge bg-danger fs-6">🔒 VOTING DITUTUP</span>';
      let html = "";
      arr.forEach((item, idx) => {
        let jabatan = idx===0?"Ketua":idx===1?"Sekretaris":idx===2?"Bendahara":"Anggota";
        html += `<tr><td>${idx+1}</td><td>${escapeHtml(item.nama)}</td><td><strong>${item.suara}</strong></td><td>${jabatan}</td></tr>`;
      });
      document.getElementById("hasilTableAdmin").innerHTML = html;
      updateChartAdmin(arr);
    } catch(e) { console.error(e); }
  }

  function updateChartAdmin(data) {
    const ctx = document.getElementById('voteChart').getContext('2d');
    if (voteChartInstance) voteChartInstance.destroy();
    voteChartInstance = new Chart(ctx, {
      type: 'bar',
      data: { labels: data.map(d=>d.nama.length>15?d.nama.slice(0,12)+'...':d.nama), datasets: [{ label: 'Suara', data: data.map(d=>d.suara), backgroundColor: '#b91c1c', borderRadius: 10 }] },
      options: { responsive: true, maintainAspectRatio: true, scales: { y: { beginAtZero: true } } }
    });
  }

  async function tutupVotingAdmin() { if(confirm("Tutup voting?")){ await fetch(API_URL,{method:"POST",body:JSON.stringify({action:"closeVoting"})}); loadAdminData(); alert("Voting ditutup"); } }

  function escapeHtml(str) { if(!str) return ""; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
