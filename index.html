<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Voting Komite | SMPN 2 Kawali</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #0a1628, #0f1a2f);
      font-family: Arial, sans-serif;
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, #0a2b5e, #021a4a);
      color: white;
      padding: 30px;
      text-align: center;
    }
    .logo {
      width: 80px;
      height: 80px;
      background: white;
      border-radius: 50%;
      margin: 0 auto 15px;
      padding: 10px;
    }
    .logo img { width: 100%; border-radius: 50%; }
    .card-login {
      background: rgba(15,25,45,0.95);
      max-width: 450px;
      margin: 40px auto;
      padding: 30px;
      border-radius: 20px;
    }
    .input-group {
      margin-bottom: 15px;
    }
    input {
      width: 100%;
      padding: 12px;
      border-radius: 25px;
      border: 1px solid #1e3a5f;
      background: #0f172a;
      color: white;
    }
    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 25px;
      width: 100%;
      cursor: pointer;
    }
    .tab-btn {
      background: transparent;
      padding: 10px 20px;
      width: auto;
      margin: 0 5px;
    }
    .tab-btn.active {
      background: #2563eb;
    }
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-content {
      background: #0f172a;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      color: white;
      max-width: 350px;
    }
    .loading {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #0f172a;
      border: 1px solid #2563eb;
      padding: 10px 20px;
      border-radius: 25px;
      color: white;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">
    <img src="https://drive.google.com/thumbnail?id=14MOrGVFoEKwDkd66Mg8rv4f4bCIaMALG&sz=w1000" alt="Logo">
  </div>
  <h2>PEMILIHAN KOMITE SEKOLAH</h2>
  <h4>SMPN 2 KAWALI</h4>
  <p>Masa Bakti 2026-2031</p>
</div>

<div id="loginArea" class="card-login">
  <div style="text-align:center; margin-bottom:20px;">
    <button class="tab-btn active" onclick="showTab('pemilih')">Pemilih</button>
    <button class="tab-btn" onclick="showTab('admin')">Admin</button>
  </div>
  
  <div id="pemilihTab">
    <input type="text" id="nama" placeholder="Nama Lengkap">
    <input type="text" id="alamat" placeholder="Alamat">
    <input type="password" id="pPassword" placeholder="Password">
    <button onclick="loginPemilih()">MASUK & VOTING</button>
  </div>
  
  <div id="adminTab" style="display:none;">
    <input type="text" id="adminUser" placeholder="Username Admin">
    <input type="password" id="adminPass" placeholder="Password Admin">
    <button onclick="loginAdmin()">MASUK DASHBOARD</button>
  </div>
</div>

<div id="votingArea" style="display:none; padding:20px;">
  <h3 style="color:white; text-align:center;">Pilih Ketua Komite</h3>
  <div id="calonList" class="row"></div>
</div>

<div id="adminArea" style="display:none; padding:20px;">
  <div style="display:flex; justify-content:space-between;">
    <h3 style="color:white;">Dashboard Admin</h3>
    <button onclick="logoutAdmin()">Keluar</button>
  </div>
  <div id="adminStats"></div>
</div>

<div id="successArea" style="display:none; text-align:center; padding:50px; color:white;">
  <i class="fas fa-check-circle" style="font-size:70px; color:#22c55e;"></i>
  <h2>TERIMA KASIH</h2>
  <p>Suara Anda berhasil disimpan</p>
  <button onclick="location.reload()">Kembali</button>
</div>

<div id="loading" style="display:none;" class="loading">
  <i class="fas fa-spinner fa-pulse"></i> Memproses...
</div>

<script>
// ==================== ⚠️ GANTI URL INI DENGAN URL DEPLOYMENT ANDA ⚠️ ====================
const API_URL = "https://script.google.com/macros/s/URL_HASIL_DEPLOY_ANDA/exec";

let currentUser = null;

function showLoading(show) {
  document.getElementById("loading").style.display = show ? "flex" : "none";
}

function showModal(title, message) {
  let modal = document.createElement('div');
  modal.className = 'modal';
  modal.innerHTML = `
    <div class="modal-content">
      <i class="fas fa-info-circle" style="font-size:50px; color:#60a5fa;"></i>
      <h3>${title}</h3>
      <p>${message}</p>
      <button onclick="this.parentElement.parentElement.remove()">OK</button>
    </div>
  `;
  document.body.appendChild(modal);
}

function showTab(tab) {
  document.getElementById("pemilihTab").style.display = tab === 'pemilih' ? 'block' : 'none';
  document.getElementById("adminTab").style.display = tab === 'admin' ? 'block' : 'none';
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
}

// ==================== PEMILIH ====================
async function loginPemilih() {
  const nama = document.getElementById("nama").value.trim().toUpperCase();
  const alamat = document.getElementById("alamat").value.trim().toUpperCase();
  const password = document.getElementById("pPassword").value.trim();
  
  if (!nama || !alamat || !password) {
    showModal("Perhatian", "Lengkapi semua data!");
    return;
  }
  
  showLoading(true);
  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "login", nama, alamat, password })
    });
    const data = await res.json();
    showLoading(false);
    
    if (data.status) {
      currentUser = data;
      showModal("Berhasil", "Login berhasil!");
      document.getElementById("loginArea").style.display = "none";
      await loadCalon();
    } else {
      showModal("Gagal", data.message);
    }
  } catch(e) {
    showLoading(false);
    showModal("Error", "Gagal terhubung ke server.\n\nPastikan URL Apps Script sudah benar dan sudah di-deploy.");
  }
}

async function loadCalon() {
  showLoading(true);
  try {
    const res = await fetch(API_URL + "?action=getCalon");
    const calon = await res.json();
    showLoading(false);
    
    let html = '<div class="row">';
    calon.forEach(c => {
      html += `
        <div class="col-md-4" style="margin-bottom:15px;">
          <div style="background:rgba(15,25,45,0.95); border-radius:15px; padding:15px;">
            <h4 style="color:white; text-align:center;">${c.nama}</h4>
            <div style="background:rgba(0,0,0,0.3); border-radius:10px; padding:10px; margin:10px 0;">
              <small style="color:#60a5fa;">Visi</small>
              <p style="color:#cbd5e1;">${c.visi}</p>
              <small style="color:#60a5fa;">Misi</small>
              <p style="color:#cbd5e1;">${c.misi}</p>
            </div>
            <button onclick="vote('${c.nama}')" style="background:#2563eb; width:100%; padding:10px; border-radius:25px;">PILIH</button>
          </div>
        </div>
      `;
    });
    html += '</div>';
    document.getElementById("calonList").innerHTML = html;
    document.getElementById("votingArea").style.display = "block";
  } catch(e) {
    showLoading(false);
    showModal("Error", "Gagal memuat data calon");
  }
}

async function vote(nama) {
  if (!confirm(`Yakin memilih ${nama} sebagai Ketua Komite? Suara tidak dapat diubah!`)) return;
  
  showLoading(true);
  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "vote", idPemilih: currentUser.id, pilihan: nama })
    });
    const data = await res.json();
    showLoading(false);
    
    if (data.status) {
      document.getElementById("votingArea").style.display = "none";
      document.getElementById("successArea").style.display = "block";
    } else {
      showModal("Gagal", data.message);
    }
  } catch(e) {
    showLoading(false);
    showModal("Error", "Gagal menyimpan suara");
  }
}

// ==================== ADMIN ====================
async function loginAdmin() {
  const user = document.getElementById("adminUser").value.trim();
  const pass = document.getElementById("adminPass").value.trim();
  
  if (user === "admin" && pass === "admin123") {
    document.getElementById("loginArea").style.display = "none";
    document.getElementById("adminArea").style.display = "block";
    loadAdminData();
    setInterval(loadAdminData, 5000);
  } else {
    showModal("Gagal", "Username atau password salah!");
  }
}

async function loadAdminData() {
  try {
    const [hasilRes, statusRes] = await Promise.all([
      fetch(API_URL + "?action=getHasil"),
      fetch(API_URL + "?action=getStatus")
    ]);
    const hasil = await hasilRes.json();
    const status = await statusRes.json();
    
    let arr = Object.entries(hasil).map(([nama, suara]) => ({ nama, suara })).sort((a,b) => b.suara - a.suara);
    let total = arr.reduce((s,i) => s + i.suara, 0);
    
    let html = `
      <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:15px; margin-bottom:20px;">
        <div style="background:rgba(15,25,45,0.95); border-radius:15px; padding:20px; text-align:center;">
          <h3>Total Suara</h3>
          <h2 style="color:#60a5fa;">${total}</h2>
        </div>
        <div style="background:rgba(15,25,45,0.95); border-radius:15px; padding:20px; text-align:center;">
          <h3>Status</h3>
          <h2 style="color:${status.statusVoting === 'OPEN' ? '#22c55e' : '#ef4444'}">${status.statusVoting === 'OPEN' ? '✅ DIBUKA' : '🔒 DITUTUP'}</h2>
        </div>
        <div style="background:rgba(15,25,45,0.95); border-radius:15px; padding:20px;">
          <button onclick="tutupVoting()" style="background:#dc2626; margin-bottom:10px;">TUTUP VOTING</button>
          <button onclick="bukaVoting()" style="background:#16a34a; margin-bottom:10px;">BUKA VOTING</button>
          <button onclick="resetData()" style="background:#dc2626;">RESET PEMILIH</button>
        </div>
      </div>
      <div style="background:rgba(15,25,45,0.95); border-radius:15px; padding:20px;">
        <h4>Hasil Voting</h4>
        <table style="width:100%; color:white; border-collapse:collapse;">
          <tr style="border-bottom:1px solid #2d4a7c;"><th>Rank</th><th>Nama</th><th>Suara</th><th>Jabatan</th></tr>
          ${arr.map((item, idx) => `<tr><td>${idx+1}</td><td>${item.nama}</td><td>${item.suara}</td><td>${idx===0?'Ketua':idx===1?'Sekretaris':idx===2?'Bendahara':'Anggota'}</td></tr>`).join('')}
        </table>
        <button onclick="downloadExcel()" style="margin-top:15px;">Download Excel</button>
      </div>
    `;
    document.getElementById("adminStats").innerHTML = html;
  } catch(e) { console.error(e); }
}

async function tutupVoting() {
  await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "closeVoting" }) });
  loadAdminData();
}
async function bukaVoting() {
  await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "openVoting" }) });
  loadAdminData();
}
async function resetData() {
  if (confirm("Yakin reset semua data?")) {
    await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "resetPemilih" }) });
    loadAdminData();
  }
}
function downloadExcel() {
  let rows = [];
  document.querySelectorAll("#adminStats table tr").forEach((row, i) => {
    if (i > 0) {
      let cells = row.querySelectorAll("td");
      if (cells.length) rows.push([cells[0]?.innerText, cells[1]?.innerText, cells[2]?.innerText, cells[3]?.innerText]);
    }
  });
  let html = `<html><body><h2>Hasil Voting</h2><table border="1"><tr><th>Rank</th><th>Nama</th><th>Suara</th><th>Jabatan</th></tr>${rows.map(r => `<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td></tr>`).join('')}</table></body></html>`;
  let blob = new Blob([html], { type: "application/vnd.ms-excel" });
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "Hasil_Voting.xls";
  a.click();
}
function logoutAdmin() {
  document.getElementById("adminArea").style.display = "none";
  document.getElementById("loginArea").style.display = "block";
}
</script>
</body>
</html>
