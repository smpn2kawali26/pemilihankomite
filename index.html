<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pemilihan Komite SMPN 2 Kawali</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#7f0000,#d62828);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow-x:hidden;
}

.container{
width:100%;
max-width:1200px;
}

.card{
background:rgba(255,255,255,0.12);
backdrop-filter:blur(12px);
padding:30px;
border-radius:25px;
box-shadow:0 8px 30px rgba(0,0,0,0.3);
text-align:center;
color:white;
animation:fadeIn 1s ease;
}

.logo{
width:120px;
height:120px;
border-radius:50%;
background:white;
padding:10px;
margin-bottom:20px;
}

h1{
font-size:34px;
font-weight:700;
margin-bottom:10px;
}

h2{
font-size:20px;
font-weight:400;
margin-bottom:20px;
}

#clock{
font-size:18px;
font-weight:600;
margin-bottom:25px;
}

.input-group{
margin-bottom:20px;
}

input{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-size:16px;
outline:none;
}

.btn{
padding:14px 25px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:16px;
font-weight:600;
margin:10px;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
}

.btn-login{
background:#ffd166;
color:#000;
}

.btn-admin{
background:white;
color:#7f0000;
}

.calon-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
margin-top:30px;
}

.calon-card{
background:white;
border-radius:20px;
padding:20px;
color:#333;
text-align:left;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
transition:0.3s;
}

.calon-card:hover{
transform:translateY(-5px);
}

.calon-card img{
width:100%;
height:260px;
object-fit:cover;
border-radius:15px;
margin-bottom:15px;
}

.calon-card h3{
color:#7f0000;
margin-bottom:10px;
}

.vote-btn{
width:100%;
padding:12px;
background:#d62828;
border:none;
border-radius:10px;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
margin-top:15px;
}

.vote-btn:hover{
background:#a00000;
}

.hasil-box{
background:white;
color:#333;
padding:20px;
border-radius:20px;
margin-top:25px;
text-align:left;
}

.rank{
background:#f5f5f5;
padding:15px;
border-radius:12px;
margin-bottom:10px;
font-weight:600;
}

.summary{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-top:20px;
}

.summary-card{
background:white;
padding:20px;
border-radius:15px;
color:#333;
font-weight:600;
}

.loading{
display:none;
margin-top:20px;
font-weight:600;
}

footer{
margin-top:20px;
font-size:14px;
opacity:0.9;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div class="container">

<div class="card" id="loginPage">

<img src="logo.png" class="logo">

<h1>PEMILIHAN KOMITE SEKOLAH</h1>

<h2>SMP NEGERI 2 KAWALI</h2>

<div id="clock"></div>

<div class="input-group">
<input type="text" id="nama" placeholder="Masukkan Nama">
</div>

<div class="input-group">
<input type="text" id="alamat" placeholder="Masukkan Alamat">
</div>

<button class="btn btn-login" onclick="loginPemilih()">
LOGIN PEMILIH
</button>

<button class="btn btn-admin" onclick="loginAdmin()">
LOGIN ADMIN
</button>

<div class="loading" id="loading">
Memproses...
</div>

<footer>
© SMP Negeri 2 Kawali 2026
</footer>

</div>

<div id="votingPage" style="display:none;">

<div class="card">

<h1>DAFTAR CALON KOMITE</h1>

<div class="summary" id="summaryBox"></div>

<div class="calon-container" id="calonList"></div>

<div class="hasil-box" id="hasilBox" style="display:none;"></div>

</div>

</div>

</div>

<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxf0OKDjaz-WPGqPRxPxlqsi7gcTFOOcqRnTYPQhBLFEZSDu3WqZZLfRnNdJxA_Ee_1/exec";

let currentUser = "";
let currentAlamat = "";

function realtimeClock(){

const now = new Date();

document.getElementById("clock").innerHTML =
now.toLocaleDateString('id-ID') +
" | " +
now.toLocaleTimeString('id-ID');

}

setInterval(realtimeClock,1000);
realtimeClock();

async function loginPemilih(){

const nama = document.getElementById("nama").value.trim();
const alamat = document.getElementById("alamat").value.trim();

if(!nama || !alamat){

alert("Lengkapi data terlebih dahulu");
return;

}

currentUser = nama;
currentAlamat = alamat;

document.getElementById("loading").style.display = "block";

const res = await fetch(
`${WEB_APP_URL}?action=login&nama=${encodeURIComponent(nama)}&alamat=${encodeURIComponent(alamat)}`
);

const data = await res.json();

document.getElementById("loading").style.display = "none";

if(data.status == "success"){

document.getElementById("loginPage").style.display = "none";
document.getElementById("votingPage").style.display = "block";

loadCalon();

}else{

alert(data.message);

}

}

async function loginAdmin(){

const username = prompt("Masukkan Username Admin");
const password = prompt("Masukkan Password Admin");

if(!username || !password) return;

const res = await fetch(
`${WEB_APP_URL}?action=adminLogin&username=${username}&password=${password}`
);

const data = await res.json();

if(data.status == "success"){

document.getElementById("loginPage").style.display = "none";
document.getElementById("votingPage").style.display = "block";

loadHasil();
loadSummary();

setInterval(loadHasil,3000);
setInterval(loadSummary,3000);

}else{

alert(data.message);

}

}

async function loadCalon(){

const res = await fetch(
`${WEB_APP_URL}?action=getCalon`
);

const data = await res.json();

let html = "";

data.forEach(c=>{

html += `

<div class="calon-card">

<img src="${convertDrive(c.foto)}">

<h3>${c.nama}</h3>

<p>
<b>Visi:</b><br>
${c.visi}
</p>

<p style="margin-top:10px;">
<b>Misi:</b><br>
${c.misi}
</p>

<button class="vote-btn"
onclick="vote('${c.id}')">
PILIH CALON
</button>

</div>

`;

});

document.getElementById("calonList").innerHTML = html;

}

async function vote(id){

if(!confirm("Yakin memilih calon ini?")){
return;
}

const res = await fetch(
`${WEB_APP_URL}?action=vote&nama=${encodeURIComponent(currentUser)}&alamat=${encodeURIComponent(currentAlamat)}&id=${id}`
);

const data = await res.json();

alert(data.message);

if(data.status == "success"){

document.getElementById("calonList").innerHTML = `
<h2>Terima kasih telah menggunakan hak suara Anda</h2>
`;

}

}

async function loadHasil(){

document.getElementById("hasilBox").style.display = "block";

const res = await fetch(
`${WEB_APP_URL}?action=hasil`
);

const data = await res.json();

let html = `
<h2>HASIL PEMILIHAN</h2>
`;

data.forEach(d=>{

html += `
<div class="rank">
${d.jabatan} :
${d.nama}
<br>
Jumlah Suara : ${d.suara}
</div>
`;

});

document.getElementById("hasilBox").innerHTML = html;

}

async function loadSummary(){

const res = await fetch(
`${WEB_APP_URL}?action=summary`
);

const data = await res.json();

document.getElementById("summaryBox").innerHTML = `

<div class="summary-card">
Total Pemilih
<br><br>
${data.totalPemilih}
</div>

<div class="summary-card">
Sudah Voting
<br><br>
${data.sudahVoting}
</div>

<div class="summary-card">
Belum Voting
<br><br>
${data.belumVoting}
</div>

`;

}

function convertDrive(url){

const id = url.match(/[-\w]{25,}/);

return `https://drive.google.com/thumbnail?id=${id}`;

}

</script>

</body>
</html>
