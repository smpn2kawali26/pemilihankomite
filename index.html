<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>E-Voting Komite | SMPN 2 Kawali - Cinematic Blue</title>
  <!-- Bootstrap 5 + Font Awesome + Google Fonts -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0a1628 0%, #0f1a2f 50%, #0c1126 100%);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      position: relative;
    }

    /* WATERMARK BACKGROUND - Karikatur memilih */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" opacity="0.08"><defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:%233b82f6;stop-opacity:0.3"/><stop offset="100%" style="stop-color:%2360a5fa;stop-opacity:0.1"/></linearGradient></defs><text x="50%" y="30%" font-size="120" text-anchor="middle" fill="url(%23grad)" font-family="Arial">🗳️</text><text x="30%" y="55%" font-size="70" text-anchor="middle" fill="url(%23grad)" font-family="Arial">✓</text><text x="70%" y="65%" font-size="90" text-anchor="middle" fill="url(%23grad)" font-family="Arial">👥</text><text x="45%" y="80%" font-size="50" text-anchor="middle" fill="url(%23grad)" font-family="Arial">PILIH</text><text x="75%" y="35%" font-size="60" text-anchor="middle" fill="url(%23grad)" font-family="Arial">🏛️</text><circle cx="120" cy="150" r="40" fill="url(%23grad)"/><circle cx="680" cy="450" r="55" fill="url(%23grad)"/><path d="M200 500 L250 450 L300 500" stroke="url(%23grad)" stroke-width="3" fill="none"/><path d="M500 150 L550 100 L600 150" stroke="url(%23grad)" stroke-width="3" fill="none"/><text x="20%" y="90%" font-size="35" text-anchor="middle" fill="url(%23grad)" font-family="Arial">SUARA RAKYAT</text><text x="80%" y="20%" font-size="40" text-anchor="middle" fill="url(%23grad)" font-family="Arial">DEMOKRASI</text></svg>');
      background-repeat: repeat;
      background-size: 280px 280px;
      background-position: center;
      pointer-events: none;
      z-index: 0;
    }

    /* Tambahan watermark dengan ikon kotak suara */
    body::after {
      content: "📫";
      position: fixed;
      bottom: 20px;
      right: 20px;
      font-size: 120px;
      opacity: 0.04;
      pointer-events: none;
      z-index: 0;
      transform: rotate(-10deg);
    }

    /* Container utama agar di atas watermark */
    .hero-header, .login-box, .calon-container, .admin-dashboard, .success-panel {
      position: relative;
      z-index: 1;
    }

    /* HEADER CINEMATIC BLUE */
    .hero-header {
      background: linear-gradient(135deg, #0a2b5e 0%, #06316e 30%, #021a4a 100%);
      color: white;
      padding: 35px 20px 40px;
      text-align: center;
      border-bottom-left-radius: 48px;
      border-bottom-right-radius: 48px;
      box-shadow: 0 15px 35px -10px rgba(0,0,0,0.4);
      position: relative;
      overflow: hidden;
    }
    .hero-header::before {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(56, 189, 248, 0.1) 0%, transparent 70%);
      animation: shimmer 8s ease-in-out infinite;
    }
    @keyframes shimmer {
      0% { transform: translate(-10%, -10%) rotate(0deg); }
      50% { transform: translate(10%, 10%) rotate(5deg); }
      100% { transform: translate(-10%, -10%) rotate(0deg); }
    }
    .hero-header::after {
      content: "🗳️";
      font-size: 170px;
      opacity: 0.05;
      position: absolute;
      bottom: -35px;
      right: -15px;
      pointer-events: none;
    }
    .logo-wrapper {
      width: 110px;
      height: 110px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 18px;
      box-shadow: 0 15px 25px rgba(0,0,0,0.3);
      position: relative;
      z-index: 2;
    }
    .logo {
      width: 92px;
      height: 92px;
      object-fit: contain;
      border-radius: 50%;
    }
    .hero-header h2 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
      position: relative;
      z-index: 2;
    }

    /* TAB STYLE */
    .auth-tabs {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 25px;
    }
    .auth-tab-btn {
      background: transparent;
      border: none;
      padding: 12px 32px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 50px;
      transition: all 0.25s;
      color: #94a3b8;
      cursor: pointer;
    }
    .auth-tab-btn.active {
      background: linear-gradient(105deg, #1e4b8f, #2563eb);
      color: white;
      box-shadow: 0 5px 15px rgba(37, 99, 235, 0.4);
    }

    /* LOGIN CARD */
    .glass-card {
      background: rgba(15, 25, 45, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 48px;
      box-shadow: 0 25px 45px -15px rgba(0,0,0,0.4);
      border: 1px solid rgba(56, 189, 248, 0.2);
    }
    .login-box {
      max-width: 500px;
      margin: 40px auto;
      padding: 35px 32px;
    }
    .login-icon {
      background: rgba(37, 99, 235, 0.2);
      width: 75px;
      height: 75px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 18px;
      color: #3b82f6;
      font-size: 34px;
    }
    .custom-input {
      width: 100%;
      padding: 14px 22px;
      border-radius: 44px;
      border: 1.5px solid #1e3a5f;
      background: #0f172a;
      color: white;
      font-size: 1rem;
      transition: 0.2s;
      outline: none;
      margin-bottom: 18px;
    }
    .custom-input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
    }
    .btn-login {
      background: linear-gradient(105deg, #1e4b8f, #2563eb);
      border: none;
      border-radius: 48px;
      padding: 14px;
      font-weight: 700;
      width: 100%;
      transition: 0.25s;
      color: white;
    }

    /* CALON CARD */
    .calon-container {
      padding: 40px 15px 70px;
    }
    .section-title span {
      background: rgba(59, 130, 246, 0.2);
      padding: 6px 24px;
      border-radius: 60px;
      color: #60a5fa;
    }
    .section-title h2 {
      color: white;
    }
    .candidate-card {
      border-radius: 38px;
      background: rgba(15, 25, 45, 0.95);
      backdrop-filter: blur(5px);
      transition: all 0.35s ease;
      overflow: hidden;
      border: 1px solid rgba(59, 130, 246, 0.3);
    }
    .candidate-card:hover {
      transform: translateY(-8px);
      border-color: rgba(59, 130, 246, 0.6);
    }
    .candidate-img {
      background: rgba(10, 20, 40, 0.8);
      padding: 25px 20px 15px;
      text-align: center;
    }
    .candidate-img img {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 50%;
      border: 3px solid #3b82f6;
    }
    .candidate-name {
      color: white;
      font-size: 1.5rem;
      font-weight: 800;
      text-align: center;
    }
    .visi-misi-box {
      background: rgba(10, 20, 40, 0.6);
      border-radius: 24px;
      padding: 12px 16px;
      margin-bottom: 14px;
    }
    .visi-misi-box h6 {
      color: #60a5fa;
    }
    .visi-misi-box p {
      color: #cbd5e1;
    }
    .btn-pilih-modern {
      background: linear-gradient(115deg, #1e4b8f, #3b82f6);
      border: none;
      border-radius: 44px;
      padding: 12px;
      font-weight: 700;
      color: white;
      width: 100%;
    }

    /* ADMIN DASHBOARD */
    .admin-dashboard {
      display: none;
      padding: 25px 20px 50px;
      position: relative;
      z-index: 1;
    }
    .stat-card {
      background: rgba(15, 25, 45, 0.95);
      backdrop-filter: blur(5px);
      border-radius: 28px;
      padding: 20px;
      text-align: center;
      border: 1px solid rgba(59, 130, 246, 0.3);
      color: white;
    }
    .stat-number {
      font-size: 2.8rem;
      font-weight: 800;
      color: #60a5fa;
    }
    .btn-action, .btn-reset {
      border-radius: 40px;
      padding: 10px;
      font-weight: 600;
      width: 100%;
      margin-bottom: 8px;
    }
    .btn-reset {
      background: linear-gradient(105deg, #dc2626, #ef4444);
      border: none;
      color: white;
      margin-top: 10px;
    }
    .hasil-table {
      background: rgba(15, 25, 45, 0.95);
      backdrop-filter: blur(5px);
      border-radius: 28px;
      padding: 20px;
      margin-top: 20px;
      border: 1px solid rgba(59, 130, 246, 0.3);
    }
    .hasil-table h5 {
      color: #60a5fa;
    }
    .dark-table {
      width: 100%;
      border-collapse: collapse;
    }
    .dark-table th, .dark-table td {
      border: 1px solid #2d4a7c;
      padding: 10px;
      color: #e2e8f0;
    }
    .dark-table th {
      background: linear-gradient(105deg, #1e3a5f, #1e4b8f);
      color: white;
    }
    .dark-table td {
      background: rgba(10, 20, 35, 0.8);
    }
    .logout-btn {
      background: linear-gradient(105deg, #1e4b8f, #3b82f6);
      border: none;
      border-radius: 40px;
      padding: 8px 20px;
      color: white;
    }

    /* MODAL ELEGAN TENGAH UNTUK SEMUA NOTIF */
    .elegant-modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(12px);
      z-index: 3000;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeInModal 0.25s ease;
    }
    @keyframes fadeInModal {
      from { opacity: 0; backdrop-filter: blur(0px); }
      to { opacity: 1; backdrop-filter: blur(12px); }
    }
    .elegant-modal-card {
      background: linear-gradient(145deg, #0f172a, #0a0f1f);
      border-radius: 56px;
      max-width: 450px;
      width: 90%;
      padding: 40px 32px;
      text-align: center;
      border: 1px solid rgba(59, 130, 246, 0.5);
      box-shadow: 0 40px 60px rgba(0, 0, 0, 0.5);
      animation: slideUpModal 0.3s ease;
    }
    @keyframes slideUpModal {
      from { transform: translateY(50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .elegant-modal-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    .elegant-modal-card h3 {
      font-size: 1.6rem;
      font-weight: 800;
      color: white;
      margin-bottom: 12px;
    }
    .elegant-modal-message {
      color: #cbd5e1;
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 20px;
    }
    .elegant-modal-warning {
      background: rgba(239, 68, 68, 0.15);
      padding: 10px 16px;
      border-radius: 60px;
      display: inline-block;
      font-size: 0.85rem;
      color: #f87171;
      margin-bottom: 28px;
    }
    .elegant-modal-info {
      background: rgba(59, 130, 246, 0.15);
      padding: 10px 16px;
      border-radius: 60px;
      display: inline-block;
      font-size: 0.85rem;
      color: #60a5fa;
      margin-bottom: 28px;
    }
    .elegant-modal-actions {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn-modal-cancel {
      background: #1e293b;
      border: 1px solid #334155;
      padding: 12px 28px;
      border-radius: 60px;
      font-weight: 600;
      color: #cbd5e1;
      cursor: pointer;
    }
    .btn-modal-confirm {
      background: linear-gradient(105deg, #2563eb, #3b82f6);
      border: none;
      padding: 12px 28px;
      border-radius: 60px;
      font-weight: 700;
      color: white;
      cursor: pointer;
    }
    .btn-modal-danger {
      background: linear-gradient(105deg, #dc2626, #ef4444);
    }

    .loading-toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #0f172a;
      border: 1px solid #3b82f6;
      color: white;
      padding: 12px 28px;
      border-radius: 60px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 2100;
    }
    .success-panel {
      text-align: center;
      padding: 60px 20px;
      color: white;
      position: relative;
      z-index: 1;
    }
    @media (max-width: 768px) {
      .hero-header h2 { font-size: 1.5rem; }
      .elegant-modal-card { padding: 30px 20px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="hero-header">
  <div class="logo-wrapper">
    <img src="https://drive.google.com/thumbnail?id=14MOrGVFoEKwDkd66Mg8rv4f4bCIaMALG&sz=w1000" class="logo" alt="Logo">
  </div>
  <h2>PEMILIHAN KOMITE SEKOLAH</h2>
  <h4>SMPN 2 KAWALI</h4>
  <p>Masa Bakti 2026–2031 • Suara Berintegritas</p>
</div>

<!-- LOGIN AREA -->
<div id="authContainer" class="login-box glass-card">
  <div class="login-icon"><i class="fas fa-fingerprint"></i></div>
  <div class="auth-tabs">
    <button class="auth-tab-btn active" onclick="switchTab('pemilih')"><i class="fas fa-user-check"></i> Pemilih</button>
    <button class="auth-tab-btn" onclick="switchTab('admin')"><i class="fas fa-user-shield"></i> Admin</button>
  </div>
  <div id="pemilihForm">
    <input type="text" id="nama" class="custom-input" placeholder="Nama Lengkap">
    <input type="text" id="alamat" class="custom-input" placeholder="Alamat / Tempat Tinggal">
    <input type="password" id="password" class="custom-input" placeholder="Password">
    <button class="btn-login" onclick="handlePemilihLogin()"><i class="fas fa-arrow-right-to-bracket"></i> Masuk & Voting</button>
  </div>
  <div id="adminForm" style="display:none;">
    <input type="text" id="adminUsername" class="custom-input" placeholder="Username Admin">
    <input type="password" id="adminPassword" class="custom-input" placeholder="Password Admin">
    <button class="btn-login" onclick="handleAdminLogin()"><i class="fas fa-chart-line"></i> Masuk Dashboard</button>
  </div>
</div>

<!-- PEMILIH AREA -->
<div id="calonContainer" class="container calon-container" style="display:none;">
  <div class="section-title text-center">
    <span><i class="fas fa-users-viewfinder"></i> Kandidat Ketua Komite</span>
    <h2 class="mt-2">Pilih Pemimpin Terbaik</h2>
  </div>
  <div class="row g-4" id="listCalon"></div>
</div>

<!-- ADMIN DASHBOARD -->
<div id="adminDashboard" class="container admin-dashboard">
  <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
    <h4 class="text-white"><i class="fas fa-chart-line"></i> Dashboard Admin</h4>
    <button class="logout-btn" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> Keluar Admin</button>
  </div>
  <div class="row g-4 mb-4">
    <div class="col-md-4">
      <div class="stat-card">
        <i class="fas fa-vote-yea fa-2x" style="color:#60a5fa;"></i>
        <div class="stat-number" id="totalSuaraAdmin">0</div>
        <div class="stat-label">Total Suara</div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="stat-card">
        <i class="fas fa-toggle-on fa-2x" style="color:#60a5fa;"></i>
        <div id="statusVotingAdmin" class="fw-bold fs-4 mt-2">--</div>
        <div class="stat-label">Status Voting</div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="stat-card">
        <button class="btn btn-danger btn-action" onclick="showConfirmModal('Tutup Voting', 'Apakah Anda yakin ingin MENUTUP voting? Peserta tidak dapat memilih lagi.', 'tutup')"><i class="fas fa-lock"></i> TUTUP VOTING</button>
        <button class="btn btn-success btn-action" onclick="showConfirmModal('Buka Voting', 'Apakah Anda yakin ingin MEMBUKA voting? Peserta dapat memilih.', 'buka')"><i class="fas fa-lock-open"></i> BUKA VOTING</button>
        <button class="btn-reset" onclick="showConfirmModal('Reset Semua Data', 'Tindakan ini akan menghapus SEMUA data pemilih dan hasil voting secara permanen! Data yang dihapus tidak dapat dikembalikan.', 'reset')"><i class="fas fa-trash-alt"></i> RESET PEMILIH</button>
      </div>
    </div>
  </div>
  <div class="row">
    <div class="col-lg-5">
      <div class="hasil-table">
        <h5><i class="fas fa-chart-pie"></i> Grafik Suara</h5>
        <canvas id="voteChart" style="max-height: 300px;"></canvas>
      </div>
    </div>
    <div class="col-lg-7">
      <div class="hasil-table">
        <h5><i class="fas fa-trophy"></i> Hasil Realtime</h5>
        <div class="table-responsive">
          <table class="dark-table" id="excelTable">
            <thead><tr><th>Rank</th><th>Nama</th><th>Suara</th><th>Jabatan</th></tr></thead>
            <tbody id="hasilTableAdmin"></tbody>
          </table>
        </div>
        <div class="d-flex gap-2 mt-3">
          <button class="btn btn-primary" onclick="downloadExcelAdmin()"><i class="fas fa-file-excel"></i> Download Excel</button>
          <button class="btn btn-secondary" onclick="window.print()"><i class="fas fa-print"></i> Print</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- SUKSES -->
<div id="sukses" style="display:none;" class="success-panel">
  <i class="fas fa-check-circle" style="font-size:70px; color:#60a5fa;"></i>
  <h2 class="fw-bold mt-3" style="color:#60a5fa;">TERIMA KASIH</h2>
  <p>Suara Anda berhasil disimpan</p>
  <button class="btn btn-primary rounded-pill px-4 py-2" onclick="kembaliHome()">Kembali ke Awal</button>
</div>

<div id="loadingToast" class="loading-toast" style="display:none;"><i class="fas fa-spinner fa-pulse"></i> <span>Memproses...</span></div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbz--tv1s4lU-eUMJTlmskNoMtC4u_ndjez--EULA489xYwvKTQqg3QBTEP0OBL-3Cd0/exec";
  let currentUser = null;
  let pendingCandidate = null;
  let voteChartInstance = null;
  let adminRefreshInterval = null;
  let isAdminMode = false;
  let pendingAction = null;

  function showLoading(msg) {
    let el = document.getElementById("loadingToast");
    el.querySelector("span").innerText = msg;
    el.style.display = "flex";
  }
  function hideLoading() { document.getElementById("loadingToast").style.display = "none"; }

  // MODAL ELEGAN TENGAH UNTUK SEMUA KONFIRMASI
  function showConfirmModal(title, message, action, isDanger = false) {
    let modalHtml = `
      <div class="elegant-modal-overlay" id="elegantModal">
        <div class="elegant-modal-card">
          <div class="elegant-modal-icon" style="background: ${isDanger ? 'rgba(220,38,38,0.15)' : 'rgba(59,130,246,0.15)'}">
            <i class="fas ${isDanger ? 'fa-exclamation-triangle' : 'fa-question-circle'}" style="font-size:42px; color:${isDanger ? '#ef4444' : '#60a5fa'}"></i>
          </div>
          <h3>${title}</h3>
          <div class="elegant-modal-message">${message}</div>
          <div class="${isDanger ? 'elegant-modal-warning' : 'elegant-modal-info'}">
            <i class="fas ${isDanger ? 'fa-trash-alt' : 'fa-info-circle'}"></i> ${isDanger ? 'Data yang dihapus tidak dapat dikembalikan' : 'Konfirmasi tindakan Anda'}
          </div>
          <div class="elegant-modal-actions">
            <button class="btn-modal-cancel" id="modalCancelBtn">Batal</button>
            <button class="btn-modal-confirm ${isDanger ? 'btn-modal-danger' : ''}" id="modalConfirmBtn">Ya, ${title.split(' ')[0]}</button>
          </div>
        </div>
      </div>
    `;
    document.body.insertAdjacentHTML("beforeend", modalHtml);
    pendingAction = action;
    document.getElementById("modalCancelBtn").onclick = () => { document.getElementById("elegantModal").remove(); pendingAction = null; };
    document.getElementById("modalConfirmBtn").onclick = async () => { 
      document.getElementById("elegantModal").remove(); 
      await executeAction(pendingAction);
      pendingAction = null;
    };
  }

  async function executeAction(action) {
    if (action === 'tutup') {
      showLoading("Menutup voting...");
      try {
        await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "closeVoting" }) });
        hideLoading();
        showAlertModal("Berhasil", "Voting telah ditutup. Peserta tidak dapat memilih lagi.", "success");
        loadAdminData();
      } catch(e) { hideLoading(); showAlertModal("Error", "Gagal menutup voting", "error"); }
    } 
    else if (action === 'buka') {
      showLoading("Membuka voting...");
      try {
        await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "openVoting" }) });
        hideLoading();
        showAlertModal("Berhasil", "Voting telah dibuka. Peserta dapat memilih sekarang.", "success");
        loadAdminData();
      } catch(e) { hideLoading(); showAlertModal("Error", "Gagal membuka voting", "error"); }
    }
    else if (action === 'reset') {
      showLoading("Meriset data pemilih...");
      try {
        const resp = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "resetPemilih" }) });
        const result = await resp.json();
        hideLoading();
        showAlertModal("Reset Berhasil", result.message || "Semua data pemilih dan hasil voting telah direset.", "success");
        loadAdminData();
      } catch(e) {
        hideLoading();
        showAlertModal("Perhatian", "Fungsi reset memerlukan endpoint di Google Apps Script. Tambahkan fungsi resetPemilih() di server.", "error");
      }
    }
  }

  // ALERT MODAL (untuk notifikasi info/success/error)
  function showAlertModal(title, message, type = "info") {
    let iconColor = type === "success" ? "#22c55e" : (type === "error" ? "#ef4444" : "#60a5fa");
    let iconClass = type === "success" ? "fa-check-circle" : (type === "error" ? "fa-times-circle" : "fa-info-circle");
    let modalHtml = `
      <div class="elegant-modal-overlay" id="alertModal">
        <div class="elegant-modal-card">
          <div class="elegant-modal-icon" style="background: ${type === 'success' ? 'rgba(34,197,94,0.15)' : (type === 'error' ? 'rgba(239,68,68,0.15)' : 'rgba(59,130,246,0.15)')}">
            <i class="fas ${iconClass}" style="font-size:42px; color:${iconColor}"></i>
          </div>
          <h3>${title}</h3>
          <div class="elegant-modal-message">${message}</div>
          <div class="elegant-modal-actions">
            <button class="btn-modal-confirm" id="alertOkBtn" style="background: linear-gradient(105deg, #2563eb, #3b82f6);">OK</button>
          </div>
        </div>
      </div>
    `;
    document.body.insertAdjacentHTML("beforeend", modalHtml);
    document.getElementById("alertOkBtn").onclick = () => { document.getElementById("alertModal").remove(); };
  }

  function switchTab(tab) {
    const pemilihForm = document.getElementById("pemilihForm");
    const adminForm = document.getElementById("adminForm");
    const btns = document.querySelectorAll(".auth-tab-btn");
    btns.forEach(btn => btn.classList.remove("active"));
    if (tab === "pemilih") {
      pemilihForm.style.display = "block";
      adminForm.style.display = "none";
      btns[0].classList.add("active");
    } else {
      pemilihForm.style.display = "none";
      adminForm.style.display = "block";
      btns[1].classList.add("active");
    }
  }

  async function handlePemilihLogin() {
    const nama = document.getElementById("nama").value.trim().toUpperCase();
    const alamat = document.getElementById("alamat").value.trim().toUpperCase();
    const password = document.getElementById("password").value.trim();
    if (!nama || !alamat || !password) { showAlertModal("Perhatian", "Lengkapi semua data login!", "error"); return; }
    showLoading("Memeriksa data...");
    try {
      const resp = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "login", nama, alamat, password }) });
      const result = await resp.json();
      hideLoading();
      if (result.status) {
        currentUser = result;
        showAlertModal("Berhasil", "Login berhasil! Silakan pilih calon.", "success");
        document.getElementById("authContainer").style.display = "none";
        await loadCalonPemilih();
      } else { showAlertModal("Gagal", result.message, "error"); }
    } catch(e) { hideLoading(); showAlertModal("Error", "Gagal terhubung ke server", "error"); }
  }

  async function loadCalonPemilih() {
    showLoading("Memuat kandidat...");
    try {
      const resp = await fetch(API_URL + "?action=getCalon");
      const data = await resp.json();
      hideLoading();
      let html = "";
      data.forEach(calon => {
        let foto = calon.foto || `https://ui-avatars.com/api/?background=2563eb&color=fff&rounded=true&size=120&name=${encodeURIComponent(calon.nama)}`;
        html += `<div class="col-md-6 col-lg-4"><div class="candidate-card"><div class="candidate-img"><img src="${foto}"></div><div class="card-body-custom p-3"><div class="candidate-name">${escapeHtml(calon.nama)}</div><div class="visi-misi-box"><h6><i class="fas fa-eye"></i> Visi</h6><p>${escapeHtml(calon.visi || "-")}</p></div><div class="visi-misi-box"><h6><i class="fas fa-bullhorn"></i> Misi</h6><p>${escapeHtml(calon.misi || "-")}</p></div><button class="btn-pilih-modern" data-nama="${escapeHtml(calon.nama)}"><i class="fas fa-vote-yea"></i> Pilih</button></div></div></div>`;
      });
      document.getElementById("listCalon").innerHTML = html;
      document.getElementById("calonContainer").style.display = "block";
      document.querySelectorAll(".btn-pilih-modern").forEach(btn => {
        btn.addEventListener("click", () => {
          let nama = btn.getAttribute("data-nama");
          showConfirmModal("Konfirmasi Pilihan", `Yakin memilih <strong>${nama}</strong> sebagai Ketua Komite?`, `vote_${nama}`);
          pendingCandidate = nama;
        });
      });
    } catch(e) { hideLoading(); showAlertModal("Error", "Gagal memuat calon", "error"); }
  }

  async function executeVote() {
    if (!currentUser || !pendingCandidate) return;
    showLoading("Menyimpan suara...");
    try {
      const resp = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "vote", idPemilih: currentUser.id, pilihan: pendingCandidate }) });
      const result = await resp.json();
      hideLoading();
      if (result.status) {
        showAlertModal("Terima Kasih", "Suara Anda berhasil disimpan!", "success");
        document.getElementById("calonContainer").style.display = "none";
        document.getElementById("sukses").style.display = "block";
      } else { showAlertModal("Gagal", result.message, "error"); }
    } catch(e) { hideLoading(); showAlertModal("Error", "Gagal menyimpan vote", "error"); }
  }

  // Override vote action
  window.executeVote = executeVote;

  async function handleAdminLogin() {
    const user = document.getElementById("adminUsername").value.trim();
    const pass = document.getElementById("adminPassword").value.trim();
    if (user === "admin" && pass === "admin123") {
      isAdminMode = true;
      document.getElementById("authContainer").style.display = "none";
      document.getElementById("adminDashboard").style.display = "block";
      loadAdminData();
      if (adminRefreshInterval) clearInterval(adminRefreshInterval);
      adminRefreshInterval = setInterval(loadAdminData, 5000);
    } else { showAlertModal("Login Gagal", "Username atau password admin salah!\n\nUsername: admin\nPassword: admin123", "error"); }
  }

  async function loadAdminData() {
    if (!isAdminMode) return;
    try {
      const [hasilRes, statusRes] = await Promise.all([fetch(API_URL + "?action=getHasil"), fetch(API_URL + "?action=getStatus")]);
      const hasil = await hasilRes.json();
      const status = await statusRes.json();
      let arr = Object.entries(hasil).map(([nama, suara]) => ({ nama, suara })).sort((a,b)=>b.suara-a.suara);
      let total = arr.reduce((sum,item)=>sum+item.suara,0);
      document.getElementById("totalSuaraAdmin").innerText = total;
      document.getElementById("statusVotingAdmin").innerHTML = status.statusVoting === "OPEN" ? '<span class="badge bg-success fs-6">✅ VOTING DIBUKA</span>' : '<span class="badge bg-danger fs-6">🔒 VOTING DITUTUP</span>';
      let html = "";
      arr.forEach((item, idx) => {
        let jabatan = idx===0?"Ketua":idx===1?"Sekretaris":idx===2?"Bendahara":"Anggota";
        html += `<tr><td>${idx+1}</td><td>${escapeHtml(item.nama)}</td><td><strong>${item.suara}</strong></td><td>${jabatan}</td></tr>`;
      });
      document.getElementById("hasilTableAdmin").innerHTML = html;
      updateChartAdmin(arr);
    } catch(e) { console.error(e); }
  }

  function updateChartAdmin(data) {
    const ctx = document.getElementById('voteChart').getContext('2d');
    if (voteChartInstance) voteChartInstance.destroy();
    voteChartInstance = new Chart(ctx, {
      type: 'bar',
      data: { labels: data.map(d=>d.nama.length>15?d.nama.slice(0,12)+'...':d.nama), datasets: [{ label: 'Suara', data: data.map(d=>d.suara), backgroundColor: '#3b82f6', borderRadius: 10 }] },
      options: { responsive: true, maintainAspectRatio: true, scales: { y: { beginAtZero: true, grid: { color: '#1e3a5f' }, ticks: { color: '#94a3b8' } }, x: { ticks: { color: '#94a3b8' } } }, plugins: { legend: { labels: { color: '#cbd5e1' } } } }
    });
  }

  function downloadExcelAdmin() {
    let rows = [];
    document.querySelectorAll("#hasilTableAdmin tr").forEach(row => {
      let cells = row.querySelectorAll("td");
      if (cells.length) rows.push([cells[0]?.innerText, cells[1]?.innerText, cells[2]?.innerText, cells[3]?.innerText]);
    });
    let htmlContent = `<html><head><meta charset="UTF-8"><title>Hasil Voting</title><style>th,td{border:1px solid black;padding:8px;}</style></head><body><h2>Hasil Voting Komite</h2><table border="1"><tr><th>Rank</th><th>Nama</th><th>Suara</th><th>Jabatan</th></tr>${rows.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td></tr>`).join('')}</table></body></html>`;
    let blob = new Blob([htmlContent], { type: "application/vnd.ms-excel" });
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `HASIL_VOTING_${new Date().toISOString().slice(0,19)}.xls`;
    a.click();
    showAlertModal("Berhasil", "File Excel berhasil diunduh", "success");
  }

  function adminLogout() { isAdminMode=false; if(adminRefreshInterval) clearInterval(adminRefreshInterval); document.getElementById("adminDashboard").style.display="none"; document.getElementById("authContainer").style.display="block"; switchTab("pemilih"); }
  function kembaliHome() { location.reload(); }
  function escapeHtml(str) { if(!str) return ""; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
</script>
</body>
</html>
