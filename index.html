<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Voting Komite | SMPN 2 Kawali</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0a1628 0%, #0f1a2f 50%, #0c1126 100%);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }
    .hero-header {
      background: linear-gradient(135deg, #0a2b5e 0%, #06316e 30%, #021a4a 100%);
      color: white;
      padding: 35px 20px 40px;
      text-align: center;
      border-bottom-left-radius: 48px;
      border-bottom-right-radius: 48px;
      box-shadow: 0 15px 35px -10px rgba(0,0,0,0.4);
    }
    .logo-wrapper {
      width: 110px;
      height: 110px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 18px;
      box-shadow: 0 15px 25px rgba(0,0,0,0.3);
    }
    .logo { width: 92px; height: 92px; object-fit: contain; border-radius: 50%; }
    .hero-header h2 { font-size: 2rem; font-weight: 800; }
    .hero-header h4 { font-size: 1.5rem; font-weight: 600; margin-top: 5px; }
    .auth-tabs { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; }
    .auth-tab-btn {
      background: transparent;
      border: none;
      padding: 12px 32px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 50px;
      color: #94a3b8;
      cursor: pointer;
    }
    .auth-tab-btn.active {
      background: linear-gradient(105deg, #1e4b8f, #2563eb);
      color: white;
      box-shadow: 0 5px 15px rgba(37,99,235,0.4);
    }
    .glass-card {
      background: rgba(15, 25, 45, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 48px;
      border: 1px solid rgba(56,189,248,0.2);
    }
    .login-box { max-width: 500px; margin: 40px auto; padding: 35px 32px; }
    .login-icon {
      background: rgba(37,99,235,0.2);
      width: 75px;
      height: 75px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 18px;
      color: #3b82f6;
      font-size: 34px;
    }
    .custom-input {
      width: 100%;
      padding: 14px 22px;
      border-radius: 44px;
      border: 1.5px solid #1e3a5f;
      background: #0f172a;
      color: white;
      font-size: 1rem;
      margin-bottom: 18px;
    }
    .custom-input:focus { border-color: #3b82f6; outline: none; }
    .password-wrapper { position: relative; margin-bottom: 18px; }
    .password-wrapper .custom-input { margin-bottom: 0; padding-right: 50px; }
    .toggle-password {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #64748b;
      background: transparent;
      border: none;
      font-size: 1.2rem;
    }
    .btn-login {
      background: linear-gradient(105deg, #1e4b8f, #2563eb);
      border: none;
      border-radius: 48px;
      padding: 14px;
      font-weight: 700;
      width: 100%;
      color: white;
      margin-top: 10px;
    }
    .calon-container { padding: 40px 15px 70px; }
    .section-title { text-align: center; margin-bottom: 40px; }
    .section-title span {
      background: rgba(59,130,246,0.2);
      padding: 6px 24px;
      border-radius: 60px;
      color: #60a5fa;
    }
    .section-title h2 { color: white; margin-top: 12px; }
    .candidate-card {
      border-radius: 38px;
      background: rgba(15,25,45,0.95);
      border: 1px solid rgba(59,130,246,0.3);
      height: 100%;
      overflow: hidden;
    }
    .candidate-img {
      background: rgba(10,20,40,0.8);
      padding: 25px;
      text-align: center;
    }
    .candidate-img img { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #3b82f6; object-fit: cover; }
    .candidate-name { color: white; font-size: 1.3rem; font-weight: 800; text-align: center; margin-bottom: 16px; }
    .visi-misi-box {
      background: rgba(10,20,40,0.6);
      border-radius: 24px;
      padding: 12px 16px;
      margin-bottom: 14px;
    }
    .visi-misi-box h6 { color: #60a5fa; margin-bottom: 6px; }
    .visi-misi-box p { color: #cbd5e1; font-size: 0.85rem; }
    .btn-pilih-modern {
      background: linear-gradient(115deg, #1e4b8f, #3b82f6);
      border: none;
      border-radius: 44px;
      padding: 12px;
      font-weight: 700;
      color: white;
      width: 100%;
    }
    .admin-dashboard { display: none; padding: 25px 20px 50px; }
    .stat-card {
      background: rgba(15,25,45,0.95);
      border-radius: 28px;
      padding: 20px;
      text-align: center;
      border: 1px solid rgba(59,130,246,0.3);
      color: white;
    }
    .stat-number { font-size: 2.5rem; font-weight: 800; color: #60a5fa; }
    .btn-action, .btn-reset { border-radius: 40px; padding: 10px; font-weight: 600; width: 100%; margin-bottom: 8px; border: none; }
    .btn-danger { background: linear-gradient(105deg, #dc2626, #ef4444); color: white; }
    .btn-success { background: linear-gradient(105deg, #16a34a, #22c55e); color: white; }
    .btn-reset { background: linear-gradient(105deg, #dc2626, #ef4444); color: white; margin-top: 10px; }
    .hasil-table {
      background: rgba(15,25,45,0.95);
      border-radius: 28px;
      padding: 20px;
      margin-top: 20px;
      border: 1px solid rgba(59,130,246,0.3);
    }
    .hasil-table h5 { color: #60a5fa; }
    .dark-table { width: 100%; border-collapse: collapse; }
    .dark-table th, .dark-table td { border: 1px solid #2d4a7c; padding: 10px; color: #e2e8f0; }
    .dark-table th { background: linear-gradient(105deg, #1e3a5f, #1e4b8f); color: white; }
    .logout-btn {
      background: linear-gradient(105deg, #1e4b8f, #3b82f6);
      border: none;
      border-radius: 40px;
      padding: 8px 20px;
      color: white;
    }
    .elegant-modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px);
      z-index: 3000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .elegant-modal-card {
      background: linear-gradient(145deg, #0f172a, #0a0f1f);
      border-radius: 56px;
      max-width: 450px;
      width: 90%;
      padding: 40px 32px;
      text-align: center;
      border: 1px solid rgba(59,130,246,0.5);
    }
    .elegant-modal-icon { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; background: rgba(59,130,246,0.15); }
    .elegant-modal-card h3 { font-size: 1.6rem; font-weight: 800; color: white; }
    .elegant-modal-message { color: #cbd5e1; margin: 20px 0; }
    .elegant-modal-actions { display: flex; gap: 16px; justify-content: center; }
    .btn-modal-cancel { background: #1e293b; border: 1px solid #334155; padding: 12px 28px; border-radius: 60px; color: #cbd5e1; cursor: pointer; }
    .btn-modal-confirm { background: linear-gradient(105deg, #2563eb, #3b82f6); border: none; padding: 12px 28px; border-radius: 60px; color: white; cursor: pointer; }
    .loading-toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #0f172a;
      border: 1px solid #3b82f6;
      color: white;
      padding: 12px 28px;
      border-radius: 60px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 2100;
    }
    .success-panel { text-align: center; padding: 80px 20px; color: white; }
    @media (max-width: 768px) {
      .hero-header h2 { font-size: 1.5rem; }
      .candidate-name { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

<div class="hero-header">
  <div class="logo-wrapper">
    <img src="https://drive.google.com/thumbnail?id=14MOrGVFoEKwDkd66Mg8rv4f4bCIaMALG&sz=w1000" class="logo" alt="Logo">
  </div>
  <h2>PEMILIHAN KOMITE SEKOLAH</h2>
  <h4>SMPN 2 KAWALI</h4>
  <p>Masa Bakti 2026–2031 • Suara Berintegritas</p>
</div>

<div id="authContainer" class="login-box glass-card">
  <div class="login-icon"><i class="fas fa-fingerprint"></i></div>
  <div class="auth-tabs">
    <button class="auth-tab-btn active" onclick="switchTab('pemilih')"><i class="fas fa-user-check"></i> Pemilih</button>
    <button class="auth-tab-btn" onclick="switchTab('admin')"><i class="fas fa-user-shield"></i> Admin</button>
  </div>
  <div id="pemilihForm">
    <input type="text" id="nama" class="custom-input" placeholder="Nama Lengkap">
    <input type="text" id="alamat" class="custom-input" placeholder="Alamat / Tempat Tinggal">
    <div class="password-wrapper">
      <input type="password" id="password" class="custom-input" placeholder="Password">
      <button type="button" class="toggle-password" onclick="togglePassword('password', this)"><i class="fas fa-eye"></i></button>
    </div>
    <button class="btn-login" onclick="handlePemilihLogin()"><i class="fas fa-arrow-right-to-bracket"></i> Masuk & Voting</button>
  </div>
  <div id="adminForm" style="display:none;">
    <input type="text" id="adminUsername" class="custom-input" placeholder="Username Admin">
    <div class="password-wrapper">
      <input type="password" id="adminPassword" class="custom-input" placeholder="Password Admin">
      <button type="button" class="toggle-password" onclick="togglePassword('adminPassword', this)"><i class="fas fa-eye"></i></button>
    </div>
    <button class="btn-login" onclick="handleAdminLogin()"><i class="fas fa-chart-line"></i> Masuk Dashboard</button>
  </div>
</div>

<div id="calonContainer" class="container calon-container" style="display:none;">
  <div class="section-title">
    <span><i class="fas fa-users-viewfinder"></i> Kandidat Ketua Komite</span>
    <h2>Pilih Pemimpin Terbaik</h2>
  </div>
  <div class="row g-4" id="listCalon"></div>
</div>

<div id="adminDashboard" class="container admin-dashboard">
  <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
    <h4 class="text-white"><i class="fas fa-chart-line"></i> Dashboard Admin</h4>
    <button class="logout-btn" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> Keluar Admin</button>
  </div>
  <div class="row g-4 mb-4">
    <div class="col-md-4">
      <div class="stat-card">
        <i class="fas fa-vote-yea fa-2x" style="color:#60a5fa;"></i>
        <div class="stat-number" id="totalSuaraAdmin">0</div>
        <div class="stat-label">Total Suara</div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="stat-card">
        <i class="fas fa-toggle-on fa-2x" style="color:#60a5fa;"></i>
        <div id="statusVotingAdmin" class="fw-bold fs-4 mt-2">--</div>
        <div class="stat-label">Status Voting</div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="stat-card">
        <button class="btn-action btn-danger" onclick="showConfirmModal('Tutup Voting', 'Apakah Anda yakin ingin MENUTUP voting?', 'tutup')"><i class="fas fa-lock"></i> TUTUP VOTING</button>
        <button class="btn-action btn-success" onclick="showConfirmModal('Buka Voting', 'Apakah Anda yakin ingin MEMBUKA voting?', 'buka')"><i class="fas fa-lock-open"></i> BUKA VOTING</button>
        <button class="btn-reset" onclick="showConfirmModal('Reset Semua Data', 'Hapus SEMUA data pemilih dan hasil voting?', 'reset', true)"><i class="fas fa-trash-alt"></i> RESET PEMILIH</button>
      </div>
    </div>
  </div>
  <div class="row">
    <div class="col-lg-5">
      <div class="hasil-table">
        <h5><i class="fas fa-chart-pie"></i> Grafik Suara</h5>
        <canvas id="voteChart" style="max-height: 300px;"></canvas>
      </div>
    </div>
    <div class="col-lg-7">
      <div class="hasil-table">
        <h5><i class="fas fa-trophy"></i> Hasil Realtime</h5>
        <div class="table-responsive">
          <table class="dark-table">
            <thead><tr><th>Rank</th><th>Nama</th><th>Suara</th><th>Jabatan</th></tr></thead>
            <tbody id="hasilTableAdmin"></tbody>
          </table>
        </div>
        <div class="d-flex gap-2 mt-3">
          <button class="btn btn-primary" onclick="downloadExcelAdmin()"><i class="fas fa-file-excel"></i> Download Excel</button>
          <button class="btn btn-secondary" onclick="window.print()"><i class="fas fa-print"></i> Print</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="sukses" style="display:none;" class="success-panel">
  <i class="fas fa-check-circle" style="font-size:70px; color:#60a5fa;"></i>
  <h2 class="fw-bold mt-3" style="color:#60a5fa;">TERIMA KASIH</h2>
  <p>Suara Anda berhasil disimpan</p>
  <button class="btn btn-primary rounded-pill px-4 py-2" onclick="location.reload()">Kembali ke Halaman Awal</button>
</div>

<div id="loadingToast" class="loading-toast" style="display:none;">
  <i class="fas fa-spinner fa-pulse"></i> <span>Memproses...</span>
</div>

<script>
  // ⚠️ URL APPS SCRIPT ANDA ⚠️
  const API_URL = "https://script.google.com/macros/s/AKfycbz--tv1s4lU-eUMJTlmskNoMtC4u_ndjez--EULA489xYwvKTQqg3QBTEP0OBL-3Cd0/exec";
  
  let currentUser = null;
  let hasVoted = false;
  let voteChartInstance = null;
  let adminRefreshInterval = null;
  let isAdminMode = false;
  let pendingAction = null;

  function togglePassword(inputId, btn) {
    const input = document.getElementById(inputId);
    const icon = btn.querySelector('i');
    if (input.type === 'password') {
      input.type = 'text';
      icon.classList.remove('fa-eye');
      icon.classList.add('fa-eye-slash');
    } else {
      input.type = 'password';
      icon.classList.remove('fa-eye-slash');
      icon.classList.add('fa-eye');
    }
  }

  function showLoading(msg) {
    let el = document.getElementById("loadingToast");
    el.querySelector("span").innerText = msg;
    el.style.display = "flex";
  }
  function hideLoading() { document.getElementById("loadingToast").style.display = "none"; }

  function showAlertModal(title, message, type = "info") {
    let iconColor = type === "success" ? "#22c55e" : "#ef4444";
    let iconClass = type === "success" ? "fa-check-circle" : "fa-times-circle";
    let modalHtml = `
      <div class="elegant-modal-overlay" id="alertModal">
        <div class="elegant-modal-card">
          <div class="elegant-modal-icon" style="background: ${type === 'success' ? 'rgba(34,197,94,0.15)' : 'rgba(239,68,68,0.15)'}">
            <i class="fas ${iconClass}" style="font-size:42px; color:${iconColor}"></i>
          </div>
          <h3>${title}</h3>
          <div class="elegant-modal-message">${message}</div>
          <div class="elegant-modal-actions">
            <button class="btn-modal-confirm" id="alertOkBtn">OK</button>
          </div>
        </div>
      </div>
    `;
    document.body.insertAdjacentHTML("beforeend", modalHtml);
    document.getElementById("alertOkBtn").onclick = () => { document.getElementById("alertModal").remove(); };
  }

  function showConfirmModal(title, message, action, isDanger = false) {
    let modalHtml = `
      <div class="elegant-modal-overlay" id="elegantModal">
        <div class="elegant-modal-card">
          <div class="elegant-modal-icon" style="background: ${isDanger ? 'rgba(220,38,38,0.15)' : 'rgba(59,130,246,0.15)'}">
            <i class="fas ${isDanger ? 'fa-exclamation-triangle' : 'fa-question-circle'}" style="font-size:42px; color:${isDanger ? '#ef4444' : '#60a5fa'}"></i>
          </div>
          <h3>${title}</h3>
          <div class="elegant-modal-message">${message}</div>
          <div class="elegant-modal-actions">
            <button class="btn-modal-cancel" id="modalCancelBtn">Batal</button>
            <button class="btn-modal-confirm" id="modalConfirmBtn">Ya</button>
          </div>
        </div>
      </div>
    `;
    document.body.insertAdjacentHTML("beforeend", modalHtml);
    pendingAction = action;
    document.getElementById("modalCancelBtn").onclick = () => { document.getElementById("elegantModal").remove(); };
    document.getElementById("modalConfirmBtn").onclick = async () => {
      document.getElementById("elegantModal").remove();
      if (pendingAction === 'tutup') await tutupVoting();
      else if (pendingAction === 'buka') await bukaVoting();
      else if (pendingAction === 'reset') await resetData();
    };
  }

  async function tutupVoting() {
    showLoading("Menutup voting...");
    await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "closeVoting" }) });
    hideLoading();
    showAlertModal("Berhasil", "Voting ditutup", "success");
    loadAdminData();
  }
  async function bukaVoting() {
    showLoading("Membuka voting...");
    await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "openVoting" }) });
    hideLoading();
    showAlertModal("Berhasil", "Voting dibuka", "success");
    loadAdminData();
  }
  async function resetData() {
    showLoading("Meriset data...");
    await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "resetPemilih" }) });
    hideLoading();
    showAlertModal("Berhasil", "Data telah direset", "success");
    loadAdminData();
  }

  function switchTab(tab) {
    const pemilihForm = document.getElementById("pemilihForm");
    const adminForm = document.getElementById("adminForm");
    const btns = document.querySelectorAll(".auth-tab-btn");
    btns.forEach(btn => btn.classList.remove("active"));
    if (tab === "pemilih") {
      pemilihForm.style.display = "block";
      adminForm.style.display = "none";
      btns[0].classList.add("active");
    } else {
      pemilihForm.style.display = "none";
      adminForm.style.display = "block";
      btns[1].classList.add("active");
    }
  }

  async function handlePemilihLogin() {
    const nama = document.getElementById("nama").value.trim().toUpperCase();
    const alamat = document.getElementById("alamat").value.trim().toUpperCase();
    const password = document.getElementById("password").value.trim();
    if (!nama || !alamat || !password) { showAlertModal("Perhatian", "Lengkapi semua data!", "error"); return; }
    showLoading("Memeriksa data...");
    try {
      const response = await fetch(API_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ action: "login", nama, alamat, password }) });
      const result = await response.json();
      hideLoading();
      if (result.status) {
        currentUser = result;
        hasVoted = false;
        showAlertModal("Berhasil", "Login berhasil!", "success");
        document.getElementById("authContainer").style.display = "none";
        await loadCalonPemilih();
      } else { showAlertModal("Gagal", result.message, "error"); }
    } catch(e) { hideLoading(); showAlertModal("Error", "Gagal terhubung ke server", "error"); }
  }

  async function loadCalonPemilih() {
    showLoading("Memuat kandidat...");
    try {
      const response = await fetch(API_URL + "?action=getCalon");
      const data = await response.json();
      hideLoading();
      let html = "";
      data.forEach(calon => {
        let foto = calon.foto || `https://ui-avatars.com/api/?background=2563eb&color=fff&rounded=true&size=120&name=${encodeURIComponent(calon.nama)}`;
        html += `<div class="col-md-6 col-lg-4 mb-4"><div class="candidate-card"><div class="candidate-img"><img src="${foto}"></div><div class="card-body-custom p-3"><div class="candidate-name">${escapeHtml(calon.nama)}</div><div class="visi-misi-box"><h6>Visi</h6><p>${escapeHtml(calon.visi)}</p></div><div class="visi-misi-box"><h6>Misi</h6><p>${escapeHtml(calon.misi)}</p></div><button class="btn-pilih-modern" data-nama="${escapeHtml(calon.nama)}">Pilih</button></div></div></div>`;
      });
      document.getElementById("listCalon").innerHTML = html;
      document.getElementById("calonContainer").style.display = "block";
      document.querySelectorAll(".btn-pilih-modern").forEach(btn => {
        btn.addEventListener("click", async () => {
          if (hasVoted) { showAlertModal("Perhatian", "Anda sudah memilih!", "error"); return; }
          await processVote(btn.getAttribute("data-nama"));
        });
      });
    } catch(e) { hideLoading(); showAlertModal("Error", "Gagal memuat data", "error"); }
  }

  async function processVote(namaCalon) {
    let confirmHtml = `
      <div class="elegant-modal-overlay" id="confirmVoteModal">
        <div class="elegant-modal-card">
          <div class="elegant-modal-icon" style="background: rgba(59,130,246,0.15)"><i class="fas fa-ballot" style="font-size:42px; color:#60a5fa"></i></div>
          <h3>Konfirmasi Pilihan</h3>
          <div class="elegant-modal-message">Yakin memilih <strong>${namaCalon}</strong> sebagai Ketua Komite?</div>
          <div class="elegant-modal-actions"><button class="btn-modal-cancel" id="confirmCancelBtn">Batal</button><button class="btn-modal-confirm" id="confirmVoteBtn">Ya, Pilih</button></div>
        </div>
      </div>
    `;
    document.body.insertAdjacentHTML("beforeend", confirmHtml);
    document.getElementById("confirmCancelBtn").onclick = () => { document.getElementById("confirmVoteModal").remove(); };
    document.getElementById("confirmVoteBtn").onclick = async () => {
      document.getElementById("confirmVoteModal").remove();
      showLoading("Menyimpan suara...");
      try {
        const response = await fetch(API_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ action: "vote", idPemilih: currentUser.id, pilihan: namaCalon }) });
        const result = await response.json();
        hideLoading();
        if (result.status) {
          hasVoted = true;
          showAlertModal("Berhasil!", "Suara Anda telah tersimpan. Terima kasih!", "success");
          document.getElementById("calonContainer").style.display = "none";
          document.getElementById("sukses").style.display = "block";
        } else { showAlertModal("Gagal", result.message, "error"); }
      } catch(e) { hideLoading(); showAlertModal("Error", "Gagal menyimpan suara", "error"); }
    };
  }

  async function handleAdminLogin() {
    const user = document.getElementById("adminUsername").value.trim();
    const pass = document.getElementById("adminPassword").value.trim();
    if (user === "admin" && pass === "admin123") {
      isAdminMode = true;
      document.getElementById("authContainer").style.display = "none";
      document.getElementById("adminDashboard").style.display = "block";
      loadAdminData();
      if (adminRefreshInterval) clearInterval(adminRefreshInterval);
      adminRefreshInterval = setInterval(loadAdminData, 5000);
    } else { showAlertModal("Login Gagal", "Username atau password salah!\n\nUsername: admin\nPassword: admin123", "error"); }
  }

  async function loadAdminData() {
    if (!isAdminMode) return;
    try {
      const [hasilRes, statusRes] = await Promise.all([fetch(API_URL + "?action=getHasil"), fetch(API_URL + "?action=getStatus")]);
      const hasil = await hasilRes.json();
      const status = await statusRes.json();
      let arr = Object.entries(hasil).map(([nama, suara]) => ({ nama, suara })).sort((a,b) => b.suara - a.suara);
      let total = arr.reduce((sum, item) => sum + item.suara, 0);
      document.getElementById("totalSuaraAdmin").innerText = total;
      document.getElementById("statusVotingAdmin").innerHTML = status.statusVoting === "OPEN" ? '<span class="badge bg-success fs-6">✅ VOTING DIBUKA</span>' : '<span class="badge bg-danger fs-6">🔒 VOTING DITUTUP</span>';
      let html = "";
      arr.forEach((item, idx) => {
        let jabatan = idx === 0 ? "Ketua" : idx === 1 ? "Sekretaris" : idx === 2 ? "Bendahara" : "Anggota";
        html += `<tr><td>${idx + 1}</td><td>${escapeHtml(item.nama)}</td><td><strong>${item.suara}</strong></td><td>${jabatan}</td></tr>`;
      });
      document.getElementById("hasilTableAdmin").innerHTML = html;
      if (voteChartInstance) voteChartInstance.destroy();
      voteChartInstance = new Chart(document.getElementById('voteChart'), { type: 'bar', data: { labels: arr.map(d => d.nama.length > 15 ? d.nama.slice(0,12)+'...' : d.nama), datasets: [{ label: 'Suara', data: arr.map(d => d.suara), backgroundColor: '#3b82f6', borderRadius: 10 }] }, options: { responsive: true } });
    } catch(e) { console.error(e); }
  }

  function downloadExcelAdmin() {
    let rows = [];
    document.querySelectorAll("#hasilTableAdmin tr").forEach(row => {
      let cells = row.querySelectorAll("td");
      if (cells.length) rows.push([cells[0]?.innerText, cells[1]?.innerText, cells[2]?.innerText, cells[3]?.innerText]);
    });
    let htmlContent = `<html><head><meta charset="UTF-8"><title>Hasil Voting</title><style>th,td{border:1px solid black;padding:8px;}</style></head><body><h2>Hasil Voting Komite</h2><table border="1"><tr><th>Rank</th><th>Nama</th><th>Suara</th><th>Jabatan</th></tr>${rows.map(r => `<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td></tr>`).join('')}</table><p>Total Suara: ${document.getElementById("totalSuaraAdmin").innerText}</p></body></html>`;
    let blob = new Blob([htmlContent], { type: "application/vnd.ms-excel" });
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `HASIL_VOTING_${new Date().toISOString().slice(0,19)}.xls`;
    a.click();
  }

  function adminLogout() { isAdminMode = false; if (adminRefreshInterval) clearInterval(adminRefreshInterval); document.getElementById("adminDashboard").style.display = "none"; document.getElementById("authContainer").style.display = "block"; switchTab("pemilih"); }
  function escapeHtml(str) { if (!str) return ""; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
</script>
</body>
</html>
