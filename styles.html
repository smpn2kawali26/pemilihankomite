<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #1a237e 0%, #0d47a1 50%, #1565c0 100%);
    min-height: 100vh;
    padding: 20px;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
  }

  .header {
    text-align: center;
    color: white;
    margin-bottom: 30px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
  }

  .logo {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 3px solid white;
    margin-bottom: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }

  .header h1 {
    font-size: 28px;
    letter-spacing: 2px;
  }

  .header h2 {
    font-size: 22px;
    font-weight: normal;
  }

  .card {
    background: rgba(255,255,255,0.95);
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    backdrop-filter: blur(10px);
    max-width: 400px;
    margin: 0 auto;
  }

  .card h3 {
    text-align: center;
    color: #1a237e;
    margin-bottom: 20px;
  }

  input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: 1px solid #ddd;
    border-radius: 10px;
    font-size: 16px;
    transition: all 0.3s;
  }

  input:focus {
    outline: none;
    border-color: #1565c0;
    box-shadow: 0 0 5px rgba(21,101,192,0.3);
  }

  button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  }

  .btn-primary {
    background: linear-gradient(135deg, #1a237e, #1565c0);
    color: white;
  }

  .btn-secondary {
    background: #eceff1;
    color: #1a237e;
  }

  .btn-vote {
    background: linear-gradient(135deg, #43a047, #66bb6a);
    color: white;
  }

  .btn-danger {
    background: linear-gradient(135deg, #c62828, #ef5350);
    color: white;
  }

  .btn-success {
    background: linear-gradient(135deg, #2e7d32, #43a047);
    color: white;
  }

  .btn-logout {
    background: #455a64;
    color: white;
    width: auto;
    padding: 8px 20px;
  }

  .message {
    text-align: center;
    margin-top: 15px;
    padding: 10px;
    border-radius: 10px;
  }

  .message.error {
    background: #ffebee;
    color: #c62828;
  }

  .message.success {
    background: #e8f5e9;
    color: #2e7d32;
  }

  .candidates-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 25px;
    margin-top: 20px;
  }

  .candidate-card {
    background: rgba(255,255,255,0.95);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    transition: transform 0.3s;
  }

  .candidate-card:hover {
    transform: translateY(-5px);
  }

  .candidate-card img {
    width: 100%;
    height: 250px;
    object-fit: cover;
  }

  .candidate-card h4 {
    padding: 15px;
    background: #1a237e;
    color: white;
    font-size: 18px;
  }

  .visi-misi {
    padding: 15px;
    font-size: 13px;
    line-height: 1.5;
    color: #333;
  }

  .visi-misi strong {
    color: #1a237e;
    display: block;
    margin-top: 10px;
  }

  .visi-misi p {
    margin-bottom: 10px;
  }

  .welcome-banner {
    background: rgba(255,255,255,0.9);
    border-radius: 15px;
    padding: 15px;
    margin-bottom: 20px;
    text-align: center;
  }

  .admin-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,0.9);
    padding: 15px 20px;
    border-radius: 15px;
    margin-bottom: 20px;
  }

  .voting-control {
    display: flex;
    gap: 15px;
    margin-bottom: 30px;
  }

  .voting-control button {
    flex: 1;
  }

  .chart-container {
    background: white;
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 30px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
  }

  canvas {
    max-height: 400px;
  }

  .rekap-table {
    width: 100%;
    background: white;
    border-radius: 15px;
    overflow: hidden;
    border-collapse: collapse;
  }

  .rekap-table th,
  .rekap-table td {
    padding: 12px 15px;
    text-align: left;
    border-bottom: 1px solid #eee;
  }

  .rekap-table th {
    background: #1a237e;
    color: white;
  }

  .rekap-table tr:hover {
    background: #f5f5f5;
  }

  .total-row {
    background: #e8eaf6;
    font-weight: bold;
  }

  @media (max-width: 768px) {
    .candidates-grid {
      grid-template-columns: 1fr;
    }
    
    .header h1 {
      font-size: 22px;
    }
    
    .card {
      margin: 0 10px;
    }
  }
</style>
