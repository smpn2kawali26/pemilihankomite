<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Voting Komite</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f2f5f9;
    font-family:Arial;
}

.header{
    background:linear-gradient(135deg,#8b0000,#ff3b3b);
    color:white;
    padding:25px;
    text-align:center;
    border-radius:0 0 20px 20px;
}

.card-box{
    background:white;
    padding:20px;
    border-radius:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    margin-bottom:20px;
}

.big-number{
    font-size:35px;
    font-weight:bold;
}

.table{
    background:white;
}

</style>
</head>
<body>

<div class="header">

    <h2>ADMIN PANEL</h2>
    <h4>PEMILIHAN KOMITE SMPN 2 KAWALI</h4>

</div>

<div class="container mt-4">

    <div class="row">

        <div class="col-md-4">

            <div class="card-box text-center">

                <h5>Total Suara</h5>

                <div class="big-number" id="totalSuara">0</div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card-box text-center">

                <h5>Status Voting</h5>

                <div class="big-number" id="statusVoting">
                    OPEN
                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card-box text-center">

                <button class="btn btn-danger w-100 mb-2"
                onclick="tutupVoting()">
                TUTUP VOTING
                </button>

                <button class="btn btn-success w-100"
                onclick="bukaVoting()">
                BUKA VOTING
                </button>

            </div>

        </div>

    </div>

    <div class="card-box">

        <h4>HASIL REALTIME</h4>

        <table class="table table-bordered">

            <thead>

                <tr>
                    <th>Ranking</th>
                    <th>Nama</th>
                    <th>Suara</th>
                    <th>Jabatan</th>
                </tr>

            </thead>

            <tbody id="hasilTable"></tbody>

        </table>

    </div>

    <div class="card-box">

        <button class="btn btn-primary"
        onclick="downloadExcel()">
        DOWNLOAD EXCEL
        </button>

        <button class="btn btn-secondary"
        onclick="window.print()">
        PRINT
        </button>

    </div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbz--tv1s4lU-eUMJTlmskNoMtC4u_ndjez--EULA489xYwvKTQqg3QBTEP0OBL-3Cd0/exec";

// ==========================
// LOAD HASIL
// ==========================
async function loadHasil(){

    const response = await fetch(API_URL + "?action=getHasil");

    const data = await response.json();

    let arr = [];

    for(let nama in data){

        arr.push({
            nama:nama,
            suara:data[nama]
        });

    }

    arr.sort((a,b)=> b.suara - a.suara);

    let total = 0;

    let html = "";

    arr.forEach((item,index)=>{

        total += item.suara;

        let jabatan = "";

        if(index == 0) jabatan = "Ketua";
        else if(index == 1) jabatan = "Sekretaris";
        else if(index == 2) jabatan = "Bendahara";
        else jabatan = "Anggota";

        html += `
        <tr>
            <td>${index+1}</td>
            <td>${item.nama}</td>
            <td>${item.suara}</td>
            <td>${jabatan}</td>
        </tr>
        `;

    });

    document.getElementById("hasilTable").innerHTML = html;

    document.getElementById("totalSuara").innerHTML = total;

}

// ==========================
// STATUS
// ==========================
async function loadStatus(){

    const response = await fetch(API_URL + "?action=getStatus");

    const data = await response.json();

    document.getElementById("statusVoting").innerHTML =
    data.statusVoting;

}

// ==========================
// TUTUP
// ==========================
async function tutupVoting(){

    const konfirmasi = confirm(
        "Yakin ingin menutup voting?"
    );

    if(!konfirmasi) return;

    const response = await fetch(API_URL,{
        method:"POST",
        body:JSON.stringify({
            action:"closeVoting"
        })
    });

    const result = await response.json();

    alert(result.message);

    loadStatus();

}

// ==========================
// BUKA
// ==========================
async function bukaVoting(){

    const response = await fetch(API_URL,{
        method:"POST",
        body:JSON.stringify({
            action:"openVoting"
        })
    });

    const result = await response.json();

    alert(result.message);

    loadStatus();

}

// ==========================
// DOWNLOAD
// ==========================
function downloadExcel(){

    let table = document.querySelector("table").outerHTML;

    let data = `
    <html>
    <head>
    <meta charset="UTF-8">
    </head>
    <body>
    ${table}
    </body>
    </html>
    `;

    let blob = new Blob(
        [data],
        {type:"application/vnd.ms-excel"}
    );

    let a = document.createElement("a");

    a.href = URL.createObjectURL(blob);

    a.download = "HASIL_VOTING_KOMITE.xls";

    a.click();

}

// ==========================
// AUTO REFRESH
// ==========================
loadHasil();
loadStatus();

setInterval(()=>{

    loadHasil();
    loadStatus();

},5000);

</script>

</body>
</html>
